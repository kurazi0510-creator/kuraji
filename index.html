<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>倉治整骨院｜予約空き投稿ジェネレーター</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Hiragino Kaku Gothic ProN','Hiragino Sans',sans-serif;background:linear-gradient(160deg,#0f172a,#1e293b);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 13px 100px;}
.hdr{width:100%;max-width:500px;display:flex;align-items:center;gap:11px;margin-bottom:20px;}
.hdr-ic{width:46px;height:46px;border-radius:13px;background:#F97316;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.hdr h1{color:#fff;font-size:19px;font-weight:800;}.hdr p{color:#94a3b8;font-size:11px;margin-top:1px;}
.card{background:#fff;border-radius:18px;width:100%;max-width:500px;margin-bottom:12px;box-shadow:0 6px 24px rgba(0,0,0,.4);overflow:hidden;}
.card-hd{padding:14px 16px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px;}
.card-hd span{font-size:17px;}.card-hd h2{font-size:15px;font-weight:800;color:#1e293b;}
.card-body{padding:14px 16px;}
.dc-row{display:flex;gap:8px;}
.dc-btn{flex:1;padding:12px 4px;border-radius:12px;font-size:15px;font-weight:700;border:2px solid #e2e8f0;background:#f8fafc;color:#64748b;cursor:pointer;text-align:center;}
.dc-btn.on{background:#1e293b;border-color:#1e293b;color:#fff;}
.day-block{background:#f8fafc;border-radius:14px;padding:13px;margin-bottom:10px;}
.day-block:last-child{margin-bottom:0;}
.db-title{font-size:13px;font-weight:800;color:#334155;margin-bottom:10px;}
.dw-row{display:flex;gap:5px;margin-bottom:12px;}
.dw-tag{padding:9px 14px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:3px solid transparent;}
.dw-tag.active{border-color:#1e293b;box-shadow:0 0 0 2px #1e293b;}
.date-inp{width:100%;padding:10px 13px;border:2px solid #e2e8f0;border-radius:11px;font-size:15px;font-family:inherit;outline:none;color:#1e293b;margin-bottom:12px;}
.date-inp:focus{border-color:#F97316;}
.slot-label{font-size:12px;color:#64748b;font-weight:700;margin-bottom:7px;margin-top:2px;}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;}
.slot-btn{padding:9px 2px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:700;background:#fff;color:#475569;cursor:pointer;text-align:center;}
.slot-btn.sel{color:#fff;}
.btn-gen{width:100%;max-width:500px;padding:17px;border-radius:15px;border:none;background:linear-gradient(135deg,#F97316,#ea580c);color:#fff;font-size:17px;font-weight:800;cursor:pointer;margin-bottom:11px;box-shadow:0 5px 18px rgba(249,115,22,.5);}
.save-area{width:100%;max-width:500px;display:none;}
.save-area.show{display:block;}
.preview-box{background:#1e293b;border-radius:18px;padding:12px;margin-bottom:10px;text-align:center;}
.preview-box p{color:#94a3b8;font-size:11px;margin-bottom:8px;}
#previewImg{max-width:100%;border-radius:10px;display:block;margin:0 auto;}
canvas{display:none;}
/* 全画面保存モーダル */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:9999;overflow-y:auto;}
.modal-ov.show{display:block;}
.modal-inner{min-height:100%;display:flex;flex-direction:column;align-items:center;padding-bottom:40px;}
.modal-hd{width:100%;background:#0f172a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.modal-hd h3{color:#fff;font-size:16px;font-weight:800;}
.modal-close{background:#ef4444;border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:22px;cursor:pointer;line-height:1;font-weight:700;}
.modal-img-box{width:calc(100% - 24px);margin:14px 12px 0;border-radius:14px;overflow:hidden;box-shadow:0 0 0 2px rgba(255,255,255,0.2);}
.modal-img-box img{width:100%;display:block;}
.guide-box{width:calc(100% - 24px);margin:12px 12px 0;background:#0c2340;border-radius:14px;padding:16px;border:2px solid #2563eb;}
.guide-title{color:#93c5fd;font-size:13px;font-weight:800;margin-bottom:12px;}
.guide-step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.guide-step:last-child{margin-bottom:0;}
.sn{background:#2563eb;color:#fff;min-width:24px;height:24px;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.st{color:#e2e8f0;font-size:14px;line-height:1.5;}
.st b{color:#fff;}
.badge-sf{display:inline-block;background:#007aff;border-radius:5px;padding:1px 5px;font-size:11px;color:#fff;font-weight:700;}
.badge-share{font-size:18px;vertical-align:middle;}
.btn-pcdl{width:calc(100% - 24px);margin:10px 12px 0;padding:14px;border-radius:13px;border:none;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:15px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>
<div class="hdr"><div class="hdr-ic">🏥</div><div><h1>倉治整骨院</h1><p>予約空き状況 投稿ジェネレーター v13</p></div></div>

<div class="card">
  <div class="card-hd"><span>📅</span><h2>何日分？</h2></div>
  <div class="card-body"><div class="dc-row">
    <button class="dc-btn on" id="dc1" onclick="setDC(1)">1日分</button>
    <button class="dc-btn" id="dc2" onclick="setDC(2)">2日分</button>
    <button class="dc-btn" id="dc3" onclick="setDC(3)">3日分</button>
  </div></div>
</div>

<div class="card">
  <div class="card-hd"><span>✏️</span><h2>日付と空き時間の入力</h2></div>
  <div class="card-body" id="dayBlocksContainer"></div>
</div>

<button class="btn-gen" onclick="generate()">🖼️ 画像を生成する</button>

<!-- 生成完了トースト -->
<div id="toast" style="display:none;position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:12px 24px;border-radius:30px;font-size:15px;font-weight:800;z-index:8888;box-shadow:0 4px 20px rgba(0,0,0,0.4);">✅ 画像を生成しました！</div>

<!-- 全画面保存モーダル -->
<div class="modal-ov" id="modalOv">
  <div class="modal-inner">
    <div class="modal-hd">
      <h3>📸 画像を保存する</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-img-box">
      <img id="modalImg" src="" alt="">
    </div>
    <div class="guide-box">
      <div class="guide-title">📱 iPhoneのカメラロールへの保存方法</div>
      <div class="guide-step">
        <div class="sn">1</div>
        <div class="st">上の画像を<b>1秒長押し</b>してください</div>
      </div>
      <div class="guide-step">
        <div class="sn">2</div>
        <div class="st">メニューが出たら<b>「写真に追加」</b>をタップ</div>
      </div>
      <div class="guide-step">
        <div class="sn">3</div>
        <div class="st">または画面下の <span class="badge-share">□↑</span> <b>共有ボタン</b>→<b>「画像を保存」</b></div>
      </div>
    </div>
    <button class="btn-pcdl" onclick="doDL()">⬇️ PC・Androidはここからダウンロード</button>
  </div>
</div>
<canvas id="cv"></canvas>

var dayCount=1;
var dates=[new Date(),addD(new Date(),1),addD(new Date(),2)];
var lastURL='';

function addD(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtD(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}

(function init(){buildBlocks();})();

function setDC(n){
  dayCount=n;
  [1,2,3].forEach(function(i){document.getElementById('dc'+i).className='dc-btn'+(i===n?' on':'');});
  buildBlocks();
}

function buildBlocks(){
  var c=document.getElementById('dayBlocksContainer');c.innerHTML='';
  for(var i=0;i<dayCount;i++){
    var d=dates[i],rawDW=d.getDay(),dw=(rawDW===0)?1:rawDW,col=DC[dw];
    var block=document.createElement('div');block.className='day-block';block.id='db'+i;
    var dwHTML='<div class="dw-row" id="dwRow'+i+'">';
    // 日曜(0)を除外、祝日(7)を追加、data-dw属性でインデックス管理
    var DW_LIST=[1,2,3,4,5,6,7];
    DW_LIST.forEach(function(w){
      var bg=DC[w][0],fg=DC[w][1],isAct=(w===dw)?'active':'';
      dwHTML+='<button class="dw-tag '+isAct+'" data-dw="'+w+'" style="background:'+bg+';color:'+fg+'" onclick="pickDW('+i+','+w+')">'+DN[w]+'</button>';
    });
    dwHTML+='</div>';
    var amH='<div class="slot-label">⛅ 午前（8:30〜12:30）</div><div class="slot-grid" id="am'+i+'">';
    AM.forEach(function(t){amH+='<button class="slot-btn" data-i="'+i+'" data-t="'+t+'" onclick="tog(this)">'+t+'</button>';});amH+='</div>';
    var pmH='<div class="slot-label">🌇 午後（15:00〜19:40）</div><div class="slot-grid" id="pm'+i+'">';
    PM.forEach(function(t){pmH+='<button class="slot-btn" data-i="'+i+'" data-t="'+t+'" onclick="tog(this)">'+t+'</button>';});pmH+='</div>';
    block.innerHTML='<div class="db-title">📅 '+(i===0?'本日':'翌'+(i>1?i:'')+'日')+'の設定</div>'+dwHTML+'<input class="date-inp" type="date" id="di'+i+'" value="'+fmtD(d)+'" onchange="onDateChange('+i+',this.value)">'+amH+pmH;
    c.appendChild(block);applyDWColor(i,dw);
  }
  document.getElementById('modalOv').classList.remove('show');document.body.style.overflow='';
}

function pickDW(i,w){
  document.getElementById('dwRow'+i).querySelectorAll('.dw-tag').forEach(function(b){
    b.classList.toggle('active', parseInt(b.getAttribute('data-dw'))===w);
  });
  applyDWColor(i,w);
  document.querySelectorAll('[data-i="'+i+'"].sel').forEach(function(b){b.style.background=DC[w][0];b.style.color=DC[w][1];b.style.borderColor=DC[w][0];});
}

function onDateChange(i,val){
  var d=new Date(val+'T00:00:00');dates[i]=d;var dw=d.getDay();
  // 日曜(0)の場合はタブに存在しないので月曜(1)を選択
  var selectDW = (dw===0) ? 1 : dw;
  document.getElementById('dwRow'+i).querySelectorAll('.dw-tag').forEach(function(b){
    b.classList.toggle('active', parseInt(b.getAttribute('data-dw'))===selectDW);
  });
  applyDWColor(i,selectDW);
}

function applyDWColor(i,dw){
  var col=DC[dw];
  document.querySelectorAll('[data-i="'+i+'"]:not(.sel)').forEach(function(b){b.style.borderColor=col[0];b.style.background='#fff';b.style.color='#475569';});
}

function tog(btn){
  var i=parseInt(btn.getAttribute('data-i')),dw=getActiveDW(i),col=DC[dw];
  if(btn.classList.contains('sel')){btn.classList.remove('sel');btn.style.background='#fff';btn.style.color='#475569';btn.style.borderColor=col[0];}
  else{btn.classList.add('sel');btn.style.background=col[0];btn.style.color=col[1];btn.style.borderColor=col[0];}
}

function getActiveDW(i){
  var row=document.getElementById('dwRow'+i);if(!row)return 1;
  var act=row.querySelector('.dw-tag.active');
  if(act) return parseInt(act.getAttribute('data-dw'));
  var dw=dates[i].getDay();return (dw===0)?1:dw;
}

function getSelSlots(i){
  var s=[];document.querySelectorAll('[data-i="'+i+'"].sel').forEach(function(b){s.push(b.getAttribute('data-t'));});return s;
}

// ===== Canvas: 完全プロ仕様設計 =====
// レイアウト原則：
//  ヘッダー帯(80px) → 日付ブロック群 → 外観写真 → フッター帯(70px)
//  日付ブロック内: [曜日バッジ帯(上部)] → [時間チップ群(下部)]
//  日付と時間は完全に独立したレーンで絶対被らない

function rr(c,x,y,w,h,r){
  if(r<=0){c.fillRect(x,y,w,h);return;}
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

function drawImage(dw0){
  var cv=document.getElementById('cv');
  var W=800,H=800;cv.width=W;cv.height=H;
  var c=cv.getContext('2d');
  var mc=DC[dw0][0],tc=DC[dw0][1];

  // ━━ 背景：ディープグラデ＋斜めストライプ
  var bg=c.createLinearGradient(0,0,W,H);
  bg.addColorStop(0,mc);
  bg.addColorStop(0.6,shadeColor(mc,-20));
  bg.addColorStop(1,shadeColor(mc,-50));
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  c.save();c.globalAlpha=0.09;c.translate(W/2,H/2);c.rotate(-38*Math.PI/180);c.translate(-W/2,-H/2);
  for(var sx=-W;sx<W*2;sx+=48){c.fillStyle='#fff';c.fillRect(sx,-H,20,H*3);}
  c.restore();c.globalAlpha=1;

  // ━━ 全体に薄いビネット
  var vig=c.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.22)');
  c.fillStyle=vig;c.fillRect(0,0,W,H);

  var d0=dates[0],dn=dates[dayCount-1];
  var titleDate=dayCount===1?(d0.getMonth()+1)+'/'+d0.getDate():(d0.getMonth()+1)+'/'+d0.getDate()+'〜'+(dn.getMonth()+1)+'/'+dn.getDate();

  // ━━ ヘッダーエリア（frosted glass風）
  c.fillStyle='rgba(255,255,255,0.14)';
  rr(c,0,0,W,80,0);c.fill();
  // ヘッダー下ライン
  c.strokeStyle='rgba(255,255,255,0.25)';c.lineWidth=1;
  c.beginPath();c.moveTo(0,80);c.lineTo(W,80);c.stroke();

  // タイトル（ドロップシャドウ付き）
  c.save();
  c.shadowColor='rgba(0,0,0,0.5)';c.shadowBlur=8;c.shadowOffsetX=2;c.shadowOffsetY=2;
  c.fillStyle='#fff';c.font='bold 34px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='left';
  c.fillText('《'+titleDate+'の予約空き状況》',22,54);
  c.restore();

  // 右上バッジ（グラデ＋シャドウ）
  c.save();
  c.shadowColor='rgba(0,0,0,0.4)';c.shadowBlur=10;c.shadowOffsetX=2;c.shadowOffsetY=3;
  var badgeGrad=c.createLinearGradient(W-192,0,W-8,0);
  badgeGrad.addColorStop(0,'#ff6b35');badgeGrad.addColorStop(1,'#ff0844');
  c.fillStyle=badgeGrad;rr(c,W-192,8,182,62,11);c.fill();
  c.restore();
  // 白い光沢ライン
  c.fillStyle='rgba(255,255,255,0.25)';rr(c,W-192,8,182,28,11);c.fill();
  c.fillStyle='rgba(255,255,255,0)';c.fillRect(W-192,22,182,16);
  c.fillStyle='#fff';c.font='bold 13px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='center';
  c.fillText('インスタ・LINE VOOM',W-101,29);c.fillText('でリアルタイム配信中 📡',W-101,48);

  // ━━ 日付ブロック群
  var MX=14,BLOCK_GAP=8;
  var BLOCK_H={1:318,2:150,3:94};
  var bh=BLOCK_H[dayCount];
  var blocksTotal=dayCount*bh+(dayCount-1)*BLOCK_GAP;
  var BLOCKS_TOP=88;

  for(var idx=0;idx<dayCount;idx++){
    var dw=getActiveDW(idx),col=DC[dw],d=dates[idx],slots=getSelSlots(idx);
    var by=BLOCKS_TOP+idx*(bh+BLOCK_GAP);

    // カード背景（白・シャドウ風の二重描画）
    c.save();
    c.shadowColor='rgba(0,0,0,0.35)';c.shadowBlur=16;c.shadowOffsetX=0;c.shadowOffsetY=4;
    c.fillStyle='rgba(255,255,255,0.97)';rr(c,MX,by,W-MX*2,bh,14);c.fill();
    c.restore();

    // ━━ 日付帯（曜日カラー・グラデ）
    var DATE_H=dayCount===1?64:dayCount===2?48:38;
    var dateGrad=c.createLinearGradient(MX,by,W-MX,by);
    dateGrad.addColorStop(0,col[0]);dateGrad.addColorStop(1,shadeColor(col[0],-25));
    c.fillStyle=dateGrad;rr(c,MX,by,W-MX*2,DATE_H,14);c.fill();
    c.fillRect(MX,by+DATE_H-14,W-MX*2,14);
    // 帯内ハイライト
    c.fillStyle='rgba(255,255,255,0.18)';rr(c,MX,by,W-MX*2,DATE_H*0.45,14);c.fill();
    c.fillRect(MX,by+DATE_H*0.35,W-MX*2,DATE_H*0.1);

    // 日付テキスト（白シャドウ付き）
    var fDate=dayCount===1?38:dayCount===2?30:24;
    c.save();
    c.shadowColor='rgba(0,0,0,0.3)';c.shadowBlur=4;c.shadowOffsetX=1;c.shadowOffsetY=1;
    c.fillStyle=col[1];c.textAlign='left';
    c.font='bold '+fDate+'px "Hiragino Kaku Gothic ProN",sans-serif';
    var dateTextY=by+(DATE_H+fDate*0.72)/2;
    c.fillText((d.getMonth()+1)+'/'+d.getDate()+'（'+DN[dw]+'）',MX+18,dateTextY);
    c.restore();

    // 曜日ドット装飾
    var dotX=W-MX-18,dotY=by+DATE_H/2;
    [0,1,2].forEach(function(k){
      c.beginPath();c.arc(dotX-k*14,dotY,4,0,Math.PI*2);
      c.fillStyle='rgba(255,255,255,'+(0.8-k*0.2)+')';c.fill();
    });

    // ━━ 時間エリア
    var TIME_TOP=by+DATE_H+10;
    var TIME_AREA_H=bh-DATE_H-14;

    if(slots.length===0){
      c.fillStyle='#9ca3af';c.font='bold '+(dayCount===1?26:20)+'px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='center';
      c.fillText('本日は満枠です🙇',W/2,TIME_TOP+TIME_AREA_H/2);
    } else {
      // 時間チップ（カラーチップ・グラデ）
      var fTime=dayCount===1?24:dayCount===2?20:15;
      var chipH=dayCount===1?40:dayCount===2?32:26;
      var chipGapX=7,chipGapY=6;
      var cols=dayCount===1?4:dayCount===2?3:2;
      var totalW=W-MX*2-20;
      var chipW=Math.floor((totalW-(cols-1)*chipGapX)/cols);

      slots.forEach(function(t,j){
        var col2=j%cols,row2=Math.floor(j/cols);
        var cx=MX+10+col2*(chipW+chipGapX);
        var cy=TIME_TOP+row2*(chipH+chipGapY);
        // チップ背景グラデ
        var cg=c.createLinearGradient(cx,cy,cx,cy+chipH);
        cg.addColorStop(0,col[2]);cg.addColorStop(1,shadeColor(col[2],-8));
        c.fillStyle=cg;rr(c,cx,cy,chipW,chipH,9);c.fill();
        // チップ左ボーダー
        c.fillStyle=col[0];rr(c,cx,cy,5,chipH,3);c.fill();
        // テキスト
        c.fillStyle='#111827';c.font='bold '+fTime+'px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='center';
        c.fillText(t,cx+chipW/2+2,cy+chipH/2+fTime*0.35);
      });

      // 1日分のみ：空いてますバッジ＋文言
      if(dayCount===1){
        var lastRow=Math.floor((slots.length-1)/cols);
        var badgeY2=TIME_TOP+(lastRow+1)*(chipH+chipGapY)+8;
        // グラデバッジ
        c.save();
        c.shadowColor='rgba(0,0,0,0.2)';c.shadowBlur=6;c.shadowOffsetY=2;
        var bg2=c.createLinearGradient(MX+10,0,MX+210,0);
        bg2.addColorStop(0,col[0]);bg2.addColorStop(1,shadeColor(col[0],-20));
        c.fillStyle=bg2;rr(c,MX+10,badgeY2,200,38,19);c.fill();
        c.restore();
        c.fillStyle='rgba(255,255,255,0.3)';rr(c,MX+10,badgeY2,200,16,19);c.fill();
        c.fillStyle=col[1];c.font='bold 21px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='center';
        c.fillText('✅ 空いてます！',MX+10+100,badgeY2+26);
        // サブテキスト
        c.fillStyle='#374151';c.font='18px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='left';
        c.fillText('当日予約もOKです。御予約お待ちしております🙏',MX+14,badgeY2+66);
      }
    }
  }

  // ━━ 外観写真
  var PHOTO_TOP=BLOCKS_TOP+blocksTotal+10;
  var FOOTER_H=74;
  var PHOTO_H=H-PHOTO_TOP-FOOTER_H-6;

  var doFinish=function(){
    // ━━ フッター（グラデ＋ゴールドライン）
    var fy=H-FOOTER_H;
    // フッター背景
    c.fillStyle='rgba(0,0,0,0.2)';c.fillRect(0,fy,W,FOOTER_H);
    // ゴールドバー
    var fgrad=c.createLinearGradient(MX,0,W-MX,0);
    fgrad.addColorStop(0,'#f59e0b');fgrad.addColorStop(0.5,'#fde047');fgrad.addColorStop(1,'#f59e0b');
    c.fillStyle=fgrad;rr(c,MX,fy+6,W-MX*2,FOOTER_H-12,10);c.fill();
    // ゴールドバー光沢
    c.fillStyle='rgba(255,255,255,0.35)';rr(c,MX,fy+6,W-MX*2,20,10);c.fill();
    // テキスト
    c.save();
    c.shadowColor='rgba(0,0,0,0.15)';c.shadowBlur=3;
    c.fillStyle='#1a1a1a';c.font='bold 20px "Hiragino Kaku Gothic ProN",sans-serif';c.textAlign='center';
    c.fillText(titleDate+'の予約空き状況　よろしくお願いします🙏',W/2,fy+31);
    c.font='14px "Hiragino Kaku Gothic ProN",sans-serif';
    c.fillText('倉治整骨院｜交野市倉治1丁目22-15　📞072-892-3223',W/2,fy+53);
    c.restore();
    lastURL=cv.toDataURL('image/jpeg',0.96);
    openModal(lastURL);
  };

  if(PHOTO_H>50&&PHOTO_B64&&PHOTO_B64.length>100){
    var img=new Image();
    img.onload=function(){
      c.save();
      rr(c,MX,PHOTO_TOP,W-MX*2,PHOTO_H,12);c.clip();
      var sc=Math.max((W-MX*2)/img.width,PHOTO_H/img.height);
      var dw2=img.width*sc,dh2=img.height*sc;
      c.drawImage(img,MX+(W-MX*2-dw2)/2,PHOTO_TOP+(PHOTO_H-dh2)/2,dw2,dh2);
      // 写真上に軽いオーバーレイ
      var photoOverlay=c.createLinearGradient(0,PHOTO_TOP,0,PHOTO_TOP+PHOTO_H);
      photoOverlay.addColorStop(0,'rgba(0,0,0,0.08)');photoOverlay.addColorStop(1,'rgba(0,0,0,0.18)');
      c.fillStyle=photoOverlay;c.fillRect(MX,PHOTO_TOP,W-MX*2,PHOTO_H);
      c.restore();doFinish();
    };
    img.onerror=doFinish;
    img.src='data:image/jpeg;base64,'+PHOTO_B64;
  } else {doFinish();}
}

// 色を明るく/暗くする
function shadeColor(hex,pct){
  var n=parseInt(hex.slice(1),16),r=Math.min(255,Math.max(0,(n>>16)+pct)),g=Math.min(255,Math.max(0,((n>>8)&0xff)+pct)),b=Math.min(255,Math.max(0,(n&0xff)+pct));
  return '#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}

function generate(){
  var dw0=getActiveDW(0);
  drawImage(dw0); // drawImage内でopenModalを呼ぶ
}

function openModal(url){
  document.getElementById('modalImg').src=url;
  document.getElementById('modalOv').classList.add('show');
  document.getElementById('modalOv').scrollTop=0;
  document.body.style.overflow='hidden';
  // トースト表示
  var t=document.getElementById('toast');
  t.style.display='block';
  setTimeout(function(){t.style.display='none';},2000);
}

function closeModal(){
  document.getElementById('modalOv').classList.remove('show');
  document.body.style.overflow='';
}

function doDL(){
  if(!lastURL)return;
  var a=document.createElement('a');a.href=lastURL;a.download='yoyaku_'+new Date().toISOString().slice(0,10)+'.jpg';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
</script>
