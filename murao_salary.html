<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="給与管理">
<meta name="theme-color" content="#2d2926">
<link rel="manifest" href="murao_manifest.json">
<title>給与管理 – 村尾さん｜倉治整骨院</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf9f7;--surface:#fff;--border:#e8e4df;
  --accent:#c17b3a;--accent-light:#f5ede2;
  --text:#2d2926;--muted:#8a7f75;
  --green:#3a7c5c;--red:#b84040;--red-light:#fceaea;
  --night:#5b4fcf;--night-light:#eeecfb;
  --holiday-red:#e53e3e;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
  min-height:100dvh;
  padding:max(16px,calc(env(safe-area-inset-top,0px) + 12px)) 16px max(16px,calc(env(safe-area-inset-bottom,0px) + 12px))}

.header{background:var(--text);color:#fff;border-radius:16px;padding:18px 20px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header-left h1{font-size:1.05rem;font-weight:700}
.header-left p{font-size:.78rem;color:#c8b9a6;margin-top:2px}
.badge{background:var(--accent);color:#fff;font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:500}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:14px}
.card-title{font-size:.75rem;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px;display:inline-block}

/* 設定グリッド */
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field label{font-size:.75rem;color:var(--muted);margin-bottom:4px;display:block}
.field input,.field select{width:100%;border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:inherit;font-size:.9rem;background:var(--bg);color:var(--text);
  outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus{border-color:var(--accent);background:#fff}
.field.full{grid-column:1/-1}
.rate-info{grid-column:1/-1;background:var(--night-light);border:1px solid var(--night);
  border-radius:10px;padding:10px 14px;font-size:.8rem;color:var(--night);display:flex;gap:16px;flex-wrap:wrap}
.rate-info span{font-weight:700}

/* GAS同期 */
.sync-bar{background:#f0faf5;border:1px solid #a8d5b5;border-radius:10px;padding:10px 14px;
  margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sync-status{font-size:.78rem;color:var(--green);flex:1}
.btn-sync{background:var(--green);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;min-height:36px}
.btn-sync:active{opacity:.8}
.btn-sync:disabled{background:#aaa;cursor:not-allowed}

/* 休業期間 */
.rest-period-grid{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px}
.rest-period-grid input[type="date"],.rest-period-grid select{
  border:1px solid var(--border);border-radius:8px;padding:7px 10px;
  font-family:inherit;font-size:.82rem;background:var(--bg);color:var(--text);
  outline:none;-webkit-appearance:none;flex:1;min-width:110px}
.rest-period-grid input[type="date"]:focus,.rest-period-grid select:focus{border-color:var(--accent)}
.rest-period-grid input[type="text"]{
  border:1px solid var(--border);border-radius:8px;padding:7px 10px;
  font-family:inherit;font-size:.82rem;background:var(--bg);color:var(--text);
  outline:none;flex:2;min-width:140px}
.rest-period-grid input[type="text"]:focus{border-color:var(--accent)}
.btn-add-rest{background:none;border:1px dashed var(--border);border-radius:8px;
  padding:7px 14px;font-family:inherit;font-size:.8rem;color:var(--muted);cursor:pointer;width:100%;margin-top:4px}
.btn-add-rest:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.rest-tag{display:inline-flex;align-items:center;gap:4px;background:#f3f0ec;
  border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:.75rem}
.rest-tag button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:0 2px}
.rest-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;min-height:24px}

/* 月ナビ */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.month-nav button{background:none;border:1px solid var(--border);border-radius:10px;
  padding:8px 18px;cursor:pointer;font-size:.88rem;color:var(--text);font-family:inherit;min-width:72px}
.month-nav button:active{background:var(--accent-light)}
.month-label{font-size:1rem;font-weight:700}

/* テーブル */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:.83rem;min-width:520px}
th{text-align:center;font-size:.68rem;font-weight:700;color:var(--muted);
  letter-spacing:.04em;padding:8px 3px;border-bottom:2px solid var(--border);background:var(--bg)}
td{text-align:center;padding:5px 3px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf6f1}
td.date-cell{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--muted)}
td.day-cell{font-size:.75rem;font-weight:700;min-width:26px}

/* 曜日・祝日色 */
.day-sun{color:#e53e3e}
.day-sat{color:#2980b9}
.day-hol{color:var(--holiday-red) !important;font-weight:700}
tr.hol-row td{background:#fff8f8}
tr.closed-row td{background:#f5f5f5;color:#bbb}

/* セレクト */
td select.time-sel{width:74px;border:1px solid var(--border);border-radius:7px;
  padding:5px 2px;font-family:'DM Mono',monospace;font-size:.8rem;
  background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;text-align:center}
td select.time-sel:focus{border-color:var(--accent);background:#fff}
td input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer}

/* 休暇区分 */
td select.abs-sel{width:86px;border:1px solid var(--border);border-radius:7px;
  padding:5px 2px;font-family:inherit;font-size:.72rem;
  background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none}
td select.abs-sel:focus{border-color:var(--accent)}
td select.abs-sel.abs-staff{background:#fff8e6 !important;color:#b7791f;border-color:#f6ad55}
td select.abs-sel.abs-clinic{background:#fff0f0 !important;color:var(--red);border-color:#fc8181}
td select.abs-sel.abs-hol{background:#fff5f5 !important;color:var(--holiday-red);border-color:var(--holiday-red)}

/* 休診理由テキスト */
.abs-note-row td{background:#fafafa}
.abs-note-row input[type="text"]{
  width:100%;border:none;border-bottom:1px solid var(--border);
  font-family:inherit;font-size:.75rem;padding:3px 6px;background:transparent;
  color:var(--muted);outline:none}
.abs-note-row input[type="text"]:focus{border-color:var(--accent);color:var(--text)}

.hours-calc{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--accent);font-weight:500}
.day-pay{font-family:'DM Mono',monospace;font-size:.82rem}
.has-night .day-pay{color:var(--night);font-weight:700}

/* 集計 */
.totals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.total-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.total-box .t-label{font-size:.68rem;color:var(--muted);margin-bottom:4px}
.total-box .t-value{font-family:'DM Mono',monospace;font-size:1rem;font-weight:700}
.total-box.highlight{background:var(--accent-light);border-color:var(--accent)}
.total-box.highlight .t-value{color:var(--accent);font-size:1.15rem}
.rest-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.rest-chip{font-size:.75rem;padding:3px 10px;border-radius:20px;background:#f3f0ec;border:1px solid var(--border)}

.note-area{width:100%;border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;font-family:inherit;font-size:.88rem;background:var(--bg);
  resize:vertical;min-height:60px;outline:none;color:var(--text)}
.note-area:focus{border-color:var(--accent)}

/* 履歴 */
.history-list{display:flex;flex-direction:column;gap:8px;max-height:320px;overflow-y:auto}
.hist-item{display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.hist-item:active{background:var(--accent-light)}
.hist-month{font-size:.88rem;font-weight:700}
.hist-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.hist-pay{font-family:'DM Mono',monospace;font-size:.95rem;font-weight:700;color:var(--accent)}
.hist-del{background:none;border:none;color:var(--red);font-size:.9rem;cursor:pointer;padding:4px 8px;border-radius:6px}
.empty-msg{text-align:center;color:var(--muted);font-size:.85rem;padding:24px}

.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:12px;
  padding:12px 20px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;min-height:44px}
.btn:active{transform:scale(.97);opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}

@media print{body{background:#fff;padding:0}.no-print{display:none!important}.card{break-inside:avoid}}
@media(min-width:768px){body{max-width:780px;margin:0 auto;padding:24px 20px}.settings-grid{grid-template-columns:repeat(4,1fr)}.rate-info{grid-column:1/-1}}
@media(max-width:480px){.totals-grid{grid-template-columns:1fr 1fr}.total-box.highlight{grid-column:1/-1}}
</style>
</head>
<body>

<div class="header">
  <div class="header-left"><h1>💴 給与管理表</h1><p>倉治整骨院 ／ スタッフ管理</p></div>
  <div class="header-right"><span class="badge">村尾 さん</span></div>
</div>

<!-- ① GAS同期バー -->
<div class="card no-print" id="syncCard">
  <div class="card-title">☁️ デバイス間データ共有（GAS同期）</div>
  <div class="sync-bar">
    <span class="sync-status" id="syncStatus">📱 未同期</span>
    <button class="btn-sync" id="btnUpload" onclick="gasUpload()">⬆ このデバイスのデータを保存</button>
    <button class="btn-sync" id="btnDownload" onclick="gasDownload()">⬇ 他デバイスのデータを取得</button>
  </div>
  <p style="font-size:.72rem;color:var(--muted);margin-top:4px">
    ※ デスクトップで入力後「⬆保存」→ iPhone/iPad で「⬇取得」すると反映されます
  </p>
</div>

<!-- ② 基本設定 -->
<div class="card no-print">
  <div class="card-title">基本設定</div>
  <div class="settings-grid">
    <div class="field"><label>スタッフ名</label><input type="text" id="staffName" value="村尾"></div>
    <div class="field"><label>交通費（円/日）</label><input type="number" id="transport" value="0" min="0" step="10" inputmode="numeric"></div>
    <div class="field"><label>通常時給（〜18:00）</label><input type="number" id="hourlyRate" value="1180" min="0" step="10" inputmode="numeric"></div>
    <div class="field"><label>深夜時給（18:00以降）</label><input type="number" id="hourlyRateNight" value="1210" min="0" step="10" inputmode="numeric"></div>
    <div class="rate-info">⏰ <span>〜18:00</span> ¥<span id="dispRate">1,180</span>／h　🌙 <span>18:00以降</span> ¥<span id="dispNight">1,210</span>／h</div>
  </div>
</div>

<!-- ③ 休業期間設定 -->
<div class="card no-print">
  <div class="card-title">🏖 休業期間設定</div>
  <div class="rest-period-grid">
    <select id="newRestType" style="-webkit-appearance:none;appearance:none;border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-family:inherit;font-size:.82rem;background:var(--bg);flex:0 0 100px">
      <option>正月休み</option><option>盆休み</option><option>GW</option>
      <option>夏季休暇</option><option>年末休暇</option><option>臨時休業</option>
    </select>
    <input type="date" id="newRestFrom">
    <span style="font-size:.8rem;color:var(--muted)">〜</span>
    <input type="date" id="newRestTo">
  </div>
  <button class="btn-add-rest" onclick="addRestPeriod()">＋ 休業期間を追加</button>
  <div class="rest-tags" id="restTags"></div>
</div>

<!-- ④ 月別勤怠 -->
<div class="card">
  <div class="month-nav no-print">
    <button onclick="changeMonth(-1)">◀ 前月</button>
    <span class="month-label" id="monthLabel"></span>
    <button onclick="changeMonth(1)">翌月 ▶</button>
  </div>
  <div class="card-title" style="margin-top:4px">勤怠入力</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日</th><th>曜</th><th>出勤</th><th>開始</th><th>終了</th>
          <th>休暇区分</th><th>時間</th><th>日当</th>
        </tr>
      </thead>
      <tbody id="attendanceBody"></tbody>
    </table>
  </div>
</div>

<!-- ⑤ 月次集計 -->
<div class="card">
  <div class="card-title">月次集計</div>
  <div class="totals-grid">
    <div class="total-box"><div class="t-label">出勤日数</div><div class="t-value" id="totalDays">0 日</div></div>
    <div class="total-box"><div class="t-label">総勤務時間</div><div class="t-value" id="totalHours">0.0 h</div></div>
    <div class="total-box highlight"><div class="t-label">支給総額</div><div class="t-value" id="totalPay">¥0</div></div>
  </div>
  <div class="rest-chips" id="restChips"></div>
  <div style="margin-top:12px">
    <div class="field"><label>備考・メモ</label>
      <textarea class="note-area" id="noteArea" placeholder="特記事項があれば入力…"></textarea>
    </div>
  </div>
  <div class="btn-row no-print">
    <button class="btn btn-primary" onclick="saveMonth()">💾 この月を保存</button>
    <button class="btn btn-green" onclick="window.print()">🖨 印刷</button>
  </div>
</div>

<!-- ⑥ 支払い履歴 -->
<div class="card no-print">
  <div class="card-title">支払い履歴</div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
// ═══════════════════════════════════
// 祝日マスタ 2025〜2026
// ═══════════════════════════════════
const HOLIDAYS = {
  "2025-01-01":"元日","2025-01-13":"成人の日",
  "2025-02-11":"建国記念の日","2025-02-23":"天皇誕生日","2025-02-24":"天皇誕生日振替",
  "2025-03-20":"春分の日","2025-04-29":"昭和の日",
  "2025-05-03":"憲法記念日","2025-05-04":"みどりの日","2025-05-05":"こどもの日","2025-05-06":"こどもの日振替",
  "2025-07-21":"海の日","2025-08-11":"山の日",
  "2025-09-15":"敬老の日","2025-09-23":"秋分の日",
  "2025-10-13":"スポーツの日","2025-11-03":"文化の日",
  "2025-11-23":"勤労感謝の日","2025-11-24":"勤労感謝の日振替",
  "2026-01-01":"元日","2026-01-12":"成人の日",
  "2026-02-11":"建国記念の日","2026-02-23":"天皇誕生日",
  "2026-03-20":"春分の日","2026-04-29":"昭和の日",
  "2026-05-03":"憲法記念日","2026-05-04":"みどりの日","2026-05-05":"こどもの日",
  "2026-07-20":"海の日","2026-08-11":"山の日",
  "2026-09-21":"敬老の日","2026-09-22":"国民の休日","2026-09-23":"秋分の日",
  "2026-10-12":"スポーツの日","2026-11-03":"文化の日","2026-11-23":"勤労感謝の日"
};

// ═══════════════════════════════════
// GAS エンドポイント（kanri.html と同じ）
// ═══════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbzorfItbYeqxLbcJrxJMhpFu9lyO6q6W4EkCiQ0Bd72Rz-jorS5mRXEXdFlTABcVOe3qw/exec";

async function gasUpload(){
  const btn = document.getElementById('btnUpload');
  btn.disabled = true; btn.textContent = '⬆ 保存中…';
  // localStorage の murao_ キー全部収集
  const payload = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(k.startsWith('murao_')) payload[k] = localStorage.getItem(k);
  }
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      body: JSON.stringify({action:'saveMurao', data: payload})
    });
    const json = await res.json();
    if(json.status === 'ok'){
      setSyncStatus('✅ 保存完了 ' + nowStr());
    } else {
      setSyncStatus('⚠ 保存失敗: ' + (json.message||''));
    }
  } catch(e){
    setSyncStatus('❌ 通信エラー: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '⬆ このデバイスのデータを保存';
}

async function gasDownload(){
  const btn = document.getElementById('btnDownload');
  btn.disabled = true; btn.textContent = '⬇ 取得中…';
  try{
    const res = await fetch(GAS_URL + '?action=loadMurao&t=' + Date.now());
    const json = await res.json();
    if(json.status === 'ok' && json.data){
      Object.entries(json.data).forEach(([k,v])=>{ if(k.startsWith('murao_')) localStorage.setItem(k,v); });
      setSyncStatus('✅ 取得完了 ' + nowStr());
      loadSettings();
      renderRestTags();
      buildTable(currentYear, currentMonth);
      renderHistory();
    } else {
      setSyncStatus('⚠ データなし or 失敗');
    }
  } catch(e){
    setSyncStatus('❌ 通信エラー: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '⬇ 他デバイスのデータを取得';
}

function setSyncStatus(msg){ document.getElementById('syncStatus').textContent = msg; }
function nowStr(){ const d=new Date(); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }

// ═══════════════════════════════════
// 定数・状態
// ═══════════════════════════════════
const DAYS = ['日','月','火','水','木','金','土'];
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();

const SK  = () => 'murao_settings';
const RK  = () => 'murao_rest_periods';
const MK  = (y,m) => `murao_salary_${y}_${m}`;

// ═══════════════════════════════════
// 祝日・休業判定
// ═══════════════════════════════════
function pad2(n){ return String(n).padStart(2,'0'); }
function dateStr(y,m,d){ return `${y}-${pad2(m+1)}-${pad2(d)}`; }
function getHoliday(y,m,d){ return HOLIDAYS[dateStr(y,m,d)] || null; }
function getRestPeriods(){ return JSON.parse(localStorage.getItem(RK())||'[]'); }
function getRestPeriod(y,m,d){
  const ds = dateStr(y,m,d);
  return getRestPeriods().find(r => r.from <= ds && ds <= r.to) || null;
}

// ═══════════════════════════════════
// 休業期間
// ═══════════════════════════════════
function addRestPeriod(){
  const type = document.getElementById('newRestType').value;
  const from = document.getElementById('newRestFrom').value;
  const to   = document.getElementById('newRestTo').value;
  if(!from||!to){ showToast('⚠ 開始日・終了日を入力してください'); return; }
  if(from>to){ showToast('⚠ 終了日は開始日以降にしてください'); return; }
  const list = getRestPeriods();
  list.push({id:Date.now(), type, from, to});
  localStorage.setItem(RK(), JSON.stringify(list));
  document.getElementById('newRestFrom').value = '';
  document.getElementById('newRestTo').value   = '';
  renderRestTags();
  buildTable(currentYear, currentMonth);
}
function removeRestPeriod(id){
  localStorage.setItem(RK(), JSON.stringify(getRestPeriods().filter(r=>r.id!==id)));
  renderRestTags();
  buildTable(currentYear, currentMonth);
}
function renderRestTags(){
  const tags = document.getElementById('restTags');
  const list = getRestPeriods();
  tags.innerHTML = list.length===0
    ? '<span style="font-size:.75rem;color:var(--muted)">登録なし</span>'
    : list.map(r=>`<span class="rest-tag">${r.type}：${r.from}〜${r.to}
        <button onclick="removeRestPeriod(${r.id})">✕</button></span>`).join('');
}

// ═══════════════════════════════════
// 設定
// ═══════════════════════════════════
function loadSettings(){
  const s = JSON.parse(localStorage.getItem(SK())||'{}');
  if(s.staffName)        document.getElementById('staffName').value        = s.staffName;
  if(s.hourlyRate)       document.getElementById('hourlyRate').value       = s.hourlyRate;
  if(s.hourlyRateNight)  document.getElementById('hourlyRateNight').value  = s.hourlyRateNight;
  if(s.transport!=null)  document.getElementById('transport').value        = s.transport;
  updateRateDisplay();
}
function saveSettings(){
  localStorage.setItem(SK(), JSON.stringify({
    staffName:       document.getElementById('staffName').value,
    hourlyRate:      +document.getElementById('hourlyRate').value,
    hourlyRateNight: +document.getElementById('hourlyRateNight').value,
    transport:       +document.getElementById('transport').value,
  }));
  updateRateDisplay();
}
function updateRateDisplay(){
  document.getElementById('dispRate').textContent  = (+document.getElementById('hourlyRate').value||0).toLocaleString();
  document.getElementById('dispNight').textContent = (+document.getElementById('hourlyRateNight').value||0).toLocaleString();
}
['staffName','hourlyRate','hourlyRateNight','transport'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{ saveSettings(); recalc(); });
});

// ═══════════════════════════════════
// セレクト生成
// ═══════════════════════════════════
function buildTimeOptions(sel){
  let h = '<option value="">--</option>';
  for(let hh=6;hh<=22;hh++){
    for(let mm=0;mm<60;mm+=30){
      const v   = hh + mm/60;
      const lbl = `${pad2(hh)}:${mm===0?'00':'30'}`;
      h += `<option value="${v}"${Math.abs(v-parseFloat(sel))<0.01?' selected':''}>${lbl}</option>`;
    }
  }
  return h;
}

const ABS_OPTS = [
  {v:'',       l:'－'},
  {v:'staff',  l:'本人都合'},
  {v:'clinic', l:'院都合'},
  {v:'hol',    l:'祝日休'},
  {v:'nenki',  l:'年末年始'},
  {v:'bon',    l:'盆休み'},
  {v:'other',  l:'その他'},
];
function buildAbsOptions(val){
  return ABS_OPTS.map(o=>`<option value="${o.v}"${o.v===val?' selected':''}>${o.l}</option>`).join('');
}
function styleAbsSel(sel){
  sel.className = 'abs-sel';
  if(sel.value==='staff')  sel.classList.add('abs-staff');
  else if(sel.value==='clinic') sel.classList.add('abs-clinic');
  else if(['hol','nenki','bon'].includes(sel.value)) sel.classList.add('abs-hol');
}

// ═══════════════════════════════════
// ★ 給与計算（修正済み）
//   〜18:00 → 通常時給
//   18:00以降 → 深夜時給（上限なし）
// ═══════════════════════════════════
function calcPay(s, e, rate, nRate){
  const normalH = Math.max(0, Math.min(e, 18) - s);       // 〜18:00
  const nightH  = e > 18 ? Math.max(0, e - Math.max(s, 18)) : 0; // 18:00〜
  return Math.round(normalH * rate + nightH * nRate);
}

// ═══════════════════════════════════
// テーブル構築
// ═══════════════════════════════════
function getDaysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }

function buildTable(y,m){
  document.getElementById('monthLabel').textContent = `${y}年 ${m+1}月`;
  const saved = JSON.parse(localStorage.getItem(MK(y,m))||'{}');
  const tbody = document.getElementById('attendanceBody');
  tbody.innerHTML = '';
  const total = getDaysInMonth(y,m);

  for(let d=1;d<=total;d++){
    const dow     = new Date(y,m,d).getDay();
    const rec     = saved[`d${d}`] || {};
    const holName = getHoliday(y,m,d);   // ← 祝日チェック
    const closed  = getRestPeriod(y,m,d);

    // 曜日セル
    let dayLabel, dayClass;
    if(holName){
      dayLabel = '祝';
      dayClass = 'day-hol';          // 赤・太字
    } else if(dow===0){
      dayLabel = '日'; dayClass = 'day-sun';
    } else if(dow===6){
      dayLabel = '土'; dayClass = 'day-sat';
    } else {
      dayLabel = DAYS[dow]; dayClass = '';
    }

    // 勤怠行
    const tr = document.createElement('tr');
    if(holName)  tr.classList.add('hol-row');
    if(closed)   tr.classList.add('closed-row');
    tr.dataset.d = d;

    const holTitle = holName ? ` title="${holName}"` : '';
    tr.innerHTML = `
      <td class="date-cell">${m+1}/${d}</td>
      <td class="day-cell ${dayClass}"${holTitle}>${dayLabel}</td>
      <td><input type="checkbox" data-d="${d}" class="chk"${rec.work?' checked':''}></td>
      <td><select data-d="${d}" class="time-sel start">${buildTimeOptions(rec.start??'')}</select></td>
      <td><select data-d="${d}" class="time-sel end">${buildTimeOptions(rec.end??'')}</select></td>
      <td><select data-d="${d}" class="abs-sel" onchange="styleAbsSel(this);toggleAbsNote(${d});autoSaveDay();recalc()">${buildAbsOptions(rec.absType??'')}</select></td>
      <td class="hours-calc" id="h${d}">-</td>
      <td class="day-pay" id="p${d}">-</td>`;
    tbody.appendChild(tr);
    styleAbsSel(tr.querySelector('.abs-sel'));

    // 休診理由行（abs-sel が '' 以外の時に表示）
    const noteRow = document.createElement('tr');
    noteRow.classList.add('abs-note-row');
    noteRow.dataset.noteFor = d;
    noteRow.style.display = rec.absType ? '' : 'none';
    noteRow.innerHTML = `
      <td colspan="8" style="padding:2px 8px 6px 32px">
        <input type="text" data-d="${d}" class="abs-note"
          placeholder="休診理由・メモ（例：スタッフ都合により午後休診）"
          value="${rec.absNote||''}">
      </td>`;
    tbody.appendChild(noteRow);
  }

  document.getElementById('noteArea').value = saved._note||'';
  tbody.querySelectorAll('input[type="checkbox"],select.time-sel').forEach(el=>{
    el.addEventListener('change',()=>{ autoSaveDay(); recalc(); });
  });
  tbody.querySelectorAll('.abs-note').forEach(el=>{
    el.addEventListener('input', autoSaveDay);
  });
  recalc();
}

function toggleAbsNote(d){
  const sel     = document.querySelector(`.abs-sel[data-d="${d}"]`);
  const noteRow = document.querySelector(`tr[data-note-for="${d}"]`);
  if(!noteRow) return;
  noteRow.style.display = sel.value ? '' : 'none';
}

// ═══════════════════════════════════
// 再計算
// ═══════════════════════════════════
function recalc(){
  const total = getDaysInMonth(currentYear, currentMonth);
  const rate  = +document.getElementById('hourlyRate').value || 0;
  const nRate = +document.getElementById('hourlyRateNight').value || 0;
  const trans = +document.getElementById('transport').value || 0;
  let sumDays=0, sumHours=0, sumPay=0;
  const absCnt = {};

  for(let d=1;d<=total;d++){
    const chk  = document.querySelector(`.chk[data-d="${d}"]`);
    const sEl  = document.querySelector(`.start[data-d="${d}"]`);
    const eEl  = document.querySelector(`.end[data-d="${d}"]`);
    const aEl  = document.querySelector(`.abs-sel[data-d="${d}"]`);
    const hEl  = document.getElementById(`h${d}`);
    const pEl  = document.getElementById(`p${d}`);
    const tr   = document.querySelector(`tr[data-d="${d}"]`) || chk?.closest('tr');

    if(aEl?.value){ absCnt[aEl.value] = (absCnt[aEl.value]||0) + 1; }

    if(!chk||!chk.checked){ hEl.textContent='-'; pEl.textContent='-'; tr?.classList.remove('has-night'); continue; }
    sumDays++;
    const s = parseFloat(sEl.value), e = parseFloat(eEl.value);
    if(!isNaN(s)&&!isNaN(e)&&e>s){
      const hours = e - s;
      const pay   = calcPay(s, e, rate, nRate) + trans;
      hEl.textContent = hours.toFixed(1);
      pEl.textContent = '¥' + pay.toLocaleString();
      sumHours += hours; sumPay += pay;
      if(e>18) tr?.classList.add('has-night'); else tr?.classList.remove('has-night');
    } else {
      hEl.textContent = sEl.value&&eEl.value?'?':'-'; pEl.textContent='-';
      tr?.classList.remove('has-night');
    }
  }

  document.getElementById('totalDays').textContent  = `${sumDays} 日`;
  document.getElementById('totalHours').textContent = `${sumHours.toFixed(1)} h`;
  document.getElementById('totalPay').textContent   = '¥' + sumPay.toLocaleString();

  const labelMap = {staff:'本人都合',clinic:'院都合',hol:'祝日休',nenki:'年末年始',bon:'盆休み',other:'その他'};
  const colorMap = {staff:'#fff8e6',clinic:'#fff0f0',hol:'#fff5f5',nenki:'#fff5f5',bon:'#fff5f5',other:'#f3f0ec'};
  const chips = document.getElementById('restChips');
  chips.innerHTML = Object.entries(absCnt).map(([k,v])=>
    `<span class="rest-chip" style="background:${colorMap[k]||'#f3f0ec'}">${labelMap[k]||k}：${v}日</span>`
  ).join('');
}

// ═══════════════════════════════════
// 保存・読み込み
// ═══════════════════════════════════
function collectData(){
  const total = getDaysInMonth(currentYear, currentMonth);
  const data  = {_note: document.getElementById('noteArea').value};
  for(let d=1;d<=total;d++){
    const chk  = document.querySelector(`.chk[data-d="${d}"]`);
    const s    = document.querySelector(`.start[data-d="${d}"]`);
    const e    = document.querySelector(`.end[data-d="${d}"]`);
    const a    = document.querySelector(`.abs-sel[data-d="${d}"]`);
    const note = document.querySelector(`.abs-note[data-d="${d}"]`);
    data[`d${d}`] = {
      work:    chk?.checked||false,
      start:   s?.value||'',
      end:     e?.value||'',
      absType: a?.value||'',
      absNote: note?.value||''
    };
  }
  return data;
}
function autoSaveDay(){ localStorage.setItem(MK(currentYear,currentMonth), JSON.stringify(collectData())); }
function saveMonth(){ autoSaveDay(); renderHistory(); showToast('💾 保存しました！'); }
function changeMonth(delta){
  autoSaveDay();
  currentMonth+=delta;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  buildTable(currentYear,currentMonth);
}

// ═══════════════════════════════════
// 履歴
// ═══════════════════════════════════
function calcPayStatic(s,e,settings){
  const rate=settings.hourlyRate||1180, nRate=settings.hourlyRateNight||1210;
  const normalH=Math.max(0,Math.min(e,18)-s);
  const nightH=e>18?Math.max(0,e-Math.max(s,18)):0;
  return Math.round(normalH*rate+nightH*nRate);
}
function renderHistory(){
  const list = document.getElementById('historyList');
  const keys = Object.keys(localStorage).filter(k=>k.startsWith('murao_salary_'));
  keys.sort().reverse();
  if(keys.length===0){list.innerHTML='<div class="empty-msg">まだ保存されたデータがありません</div>';return;}
  const settings = JSON.parse(localStorage.getItem(SK())||'{}');
  list.innerHTML='';
  keys.forEach(k=>{
    const p=k.split('_'); const y=+p[p.length-2], m=+p[p.length-1];
    const data=JSON.parse(localStorage.getItem(k)||'{}');
    const tr=settings.transport||0;
    let days=0,hours=0,pay=0;
    Object.keys(data).filter(k2=>k2.startsWith('d')).forEach(k2=>{
      const r=data[k2];
      if(r.work){days++;const s=parseFloat(r.start),e=parseFloat(r.end);
        if(!isNaN(s)&&!isNaN(e)&&e>s){hours+=e-s;pay+=calcPayStatic(s,e,settings)+tr;}}
    });
    const div=document.createElement('div');
    div.className='hist-item';
    div.innerHTML=`
      <div onclick="loadMonth(${y},${m})">
        <div class="hist-month">${y}年 ${m+1}月</div>
        <div class="hist-meta">${days}日出勤 / ${hours.toFixed(1)}h</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="hist-pay">¥${pay.toLocaleString()}</span>
        <button class="hist-del" onclick="deleteMonth(event,'${k}')">✕</button>
      </div>`;
    list.appendChild(div);
  });
}
function loadMonth(y,m){autoSaveDay();currentYear=y;currentMonth=m;buildTable(y,m);window.scrollTo({top:0,behavior:'smooth'});}
function deleteMonth(e,key){e.stopPropagation();if(!confirm('削除しますか？'))return;localStorage.removeItem(key);renderHistory();}

function showToast(msg){
  const t=document.createElement('div');
  t.textContent=msg;
  Object.assign(t.style,{position:'fixed',bottom:'calc(24px + env(safe-area-inset-bottom,0px))',
    left:'50%',transform:'translateX(-50%)',background:'#2d2926',color:'#fff',
    padding:'10px 20px',borderRadius:'24px',fontSize:'.88rem',zIndex:9999,
    opacity:'0',transition:'opacity .2s',whiteSpace:'nowrap'});
  document.body.appendChild(t);
  requestAnimationFrame(()=>{t.style.opacity='1';});
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2200);
}

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('murao_sw.js').catch(()=>{}));
}

document.getElementById('noteArea').addEventListener('input', autoSaveDay);
loadSettings();
renderRestTags();
buildTable(currentYear, currentMonth);
renderHistory();
</script>
