<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>予約データ復元ツール</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hiragino Sans',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px;}
.card{background:#1e293b;border-radius:14px;padding:20px;max-width:600px;margin:0 auto;}
h1{color:#f97316;font-size:0.95rem;text-align:center;margin-bottom:16px;}
.log{font-family:monospace;font-size:0.72rem;line-height:1.9;background:#0f172a;border-radius:8px;padding:12px;max-height:400px;overflow-y:auto;margin-bottom:12px;}
.ok{color:#22c55e;}.ng{color:#ef4444;}.info{color:#94a3b8;}.warn{color:#fbbf24;}
.prog-bar{background:#0f172a;border-radius:6px;height:8px;margin:8px 0;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,#f97316,#22c55e);border-radius:6px;transition:width 0.3s;width:0%;}
.btn{display:block;width:100%;padding:12px;border:none;border-radius:8px;font-size:0.9rem;font-weight:bold;cursor:pointer;margin-top:8px;}
.btn-go{background:#f97316;color:white;}
.btn-back{background:#1e3a5f;color:#7dd3fc;}
</style>
</head>
<body>
<div class="card">
<h1>🔄 予約データ復元ツール</h1>
<div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
<div class="log" id="log"><div class="info">「復元開始」を押してください</div></div>
<button class="btn btn-go" id="go-btn" onclick="run()">🚀 localStorageのデータをGASに復元</button>
<button class="btn btn-back" onclick="location.href='kanri.html'">← 管理システムへ</button>
</div>
<script>
const GAS='https://script.google.com/macros/s/AKfycbyJt0p0pSFsmmtdTDHRJBlaXebrvNuSKAzcYF2VlVLAsBDuKp2X68hEe6qUv_I6PwlJrg/exec';

const HDR=['日付','時間','区分','患者名','診察券No','予約ルート','来院回数','経過日数',
  '症状','オプション','自費メニュー','処置(JSON)','処置メモ','物販(JSON)',
  '支払方法','支払金額','区分リスト','再予約情報','キャンセル理由','施術部位'];

function log(msg,cls='info'){
  const d=document.getElementById('log');
  d.innerHTML+=`<div class="${cls}">${msg}</div>`;
  d.scrollTop=d.scrollHeight;
}
function prog(v){document.getElementById('prog').style.width=v+'%';}

async function run(){
  document.getElementById('go-btn').disabled=true;
  log('📦 localStorageからデータを読み込み中...','info');
  
  const raw=localStorage.getItem('kj_bookings');
  if(!raw){log('❌ localStorageにデータがありません','ng');return;}
  
  const bookings=JSON.parse(raw);
  const dates=Object.keys(bookings).sort();
  log(`✅ ${dates.length}日分のデータを読み込みました`,'ok');
  prog(20);
  
  // rows配列に変換
  const rows=[HDR];
  let count=0;
  
  dates.forEach(date=>{
    const slots=bookings[date];
    Object.keys(slots).sort().forEach(time=>{
      const bk=slots[time];
      let row;
      if(bk.cont){
        row=[date,time,'(継続)',bk.name||'',bk.cardId||'','','','','','','','[]','','[]','','','','','',''];
      }else if(bk.cancelled){
        row=[date,time,'(キャンセル)',bk.name||'',bk.cardId||'','','','','','','','[]','','[]','','','','',bk.cancelReason||'',''];
      }else{
        const pay=Array.isArray(bk.pay)?bk.pay.join(','):'';
        const kubunList=Array.isArray(bk.kubunList)?bk.kubunList.join(','):(bk.kubun||'');
        const bui=Array.isArray(bk.bui)?bk.bui.join(','):'';
        const shochi=JSON.stringify(Array.isArray(bk.shochi)?bk.shochi:[]);
        const bussan=JSON.stringify(Array.isArray(bk.bussan)?bk.bussan:[]);
        row=[date,time,bk.kubun||'',bk.name||'',bk.cardId||'',
             bk.route||'',String(bk.visitCount||''),String(bk.elapsed||''),
             bk.symptom||'',bk.option||'',bk.menu||'',
             shochi,bk.shochiMemo||'',bussan,
             pay,String(bk.payAmount||''),kubunList,'','',bui];
      }
      rows.push(row);
      count++;
    });
  });
  
  log(`📋 ${count}行のデータを変換しました`,'ok');
  prog(40);
  
  log('💾 GASに送信中...','info');
  try{
    const res=await fetch(GAS,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'saveBookings',rows:JSON.stringify(rows)}),
      redirect:'follow'
    });
    const d=JSON.parse(await res.text());
    prog(100);
    if(d.ok){
      log(`✅ GAS保存完了！ ${count}行を「予約表」シートに書き込みました`,'ok');
      log('「管理システムへ」→「🔄 最新データ取得」を押してください','info');
    }else{
      throw new Error(d.error||'保存エラー');
    }
  }catch(e){
    log('❌ '+e.message,'ng');
  }
}
</script>
</body>
</html>
