<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GASコード - 倉治整骨院</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Hiragino Sans',sans-serif;background:#0f172a;color:#e2e8f0;padding:16px;}
.card{background:#1e293b;border-radius:12px;padding:20px;max-width:600px;margin:0 auto;}
h1{color:#f97316;font-size:1rem;text-align:center;margin-bottom:8px;}
.step{background:#1e3a5f;border-radius:8px;padding:12px 14px;margin:10px 0;font-size:0.8rem;color:#7dd3fc;line-height:2;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:10px;font-size:1rem;font-weight:bold;cursor:pointer;margin-bottom:10px;}
.btn-copy{background:#f97316;color:white;}
.btn-dl{background:#22c55e;color:white;}
.btn-back{background:#374151;color:#94a3b8;}
#status{padding:10px;border-radius:8px;text-align:center;font-size:0.82rem;display:none;margin-bottom:10px;}
.ok{background:#dcfce7;color:#166534;}
</style>
</head>
<body>
<div class="card">
  <h1>⚙️ GASコード更新</h1>
  
  <div class="step">
    <strong>【手順】</strong><br>
    ① 「📋 クリップボードにコピー」を押す<br>
    ② <a href="https://script.google.com" target="_blank" style="color:#60a5fa">script.google.com</a> を開く<br>
    ③ 「無題のプロジェクト」→「コード.gs」をクリック<br>
    ④ <kbd>Ctrl+A</kbd> → <kbd>Delete</kbd> → <kbd>Ctrl+V</kbd> → <kbd>Ctrl+S</kbd><br>
    ⑤ 関数を「setupAllTriggers」に変更 → 「▶ 実行」<br>
    ⑥ デプロイ → デプロイを管理 → 鉛筆 → 新しいバージョン → デプロイ
  </div>
  
  <div id="status"></div>
  <button class="btn btn-copy" onclick="copyGAS()">📋 クリップボードにコピー</button>
  <button class="btn btn-dl" onclick="downloadGAS()">💾 .gsファイルとしてダウンロード</button>
  <button class="btn btn-back" onclick="location.href='kanri.html'">← 管理システムに戻る</button>
</div>

<script>
function getGASCode(){
  return [
'function myTest(){',
'  var token="RomnT7om/ytYjz1dicHgMbaxHZvnccCeBP6C3FX1s1TtiCW1ME3X3fK098wacBfDttVgnMM4jZPRN6G+RWRmYrkZUW+qkEjlugm5FVNagj5WOfwINV6NqEoNCH9OVbI7qViP6XzF3GEYdjWGHQvIsgdB04t89/1O/w1cDnyilFU=";',
'  var userId="U9f7333eed2d51ceba13641059e8bd341";',
'  var result=sendLineMessagingAPI(token,userId,"【倉治整骨院】LINEテスト");',
'  Logger.log(JSON.stringify(result));',
'}',
'function doGet(e){',
'  var action=(e&&e.parameter&&e.parameter.action)||"getAll";',
'  var callback=(e&&e.parameter&&e.parameter.callback)||"";',
'  var result;',
'  try{if(action==="getAll"){result=getAllData();}else{result={ok:true};}}',
'  catch(err){result={ok:false,error:err.message};}',
'  var json=JSON.stringify(result);',
'  if(callback)return ContentService.createTextOutput(callback+"("+json+")").setMimeType(ContentService.MimeType.JAVASCRIPT);',
'  return ContentService.createTextOutput(json).setMimeType(ContentService.MimeType.JSON);',
'}',
'function doPost(e){',
'  var body={};',
'  try{body=JSON.parse(e.postData.contents);}catch(err){}',
'  if(body.events&&body.events.length>0){',
'    body.events.forEach(function(ev){',
'      if(ev.type==="message"&&ev.source&&ev.source.userId){',
'        var uid=ev.source.userId,dname="";',
'        try{',
'          var tok=PropertiesService.getScriptProperties().getProperty("LINE_TOKEN");',
'          if(tok){',
'            var r=UrlFetchApp.fetch("https://api.line.me/v2/bot/profile/"+uid,{',
'              headers:{"Authorization":"Bearer "+tok},muteHttpExceptions:true});',
'            if(r.getResponseCode()===200)dname=JSON.parse(r.getContentText()).displayName||"";',
'          }',
'        }catch(err){}',
'        saveLineUserId(uid,dname,ev.message?ev.message.text:"");',
'      }',
'    });',
'    return ContentService.createTextOutput(JSON.stringify({ok:true})).setMimeType(ContentService.MimeType.JSON);',
'  }',
'  var action=body.action||"",result;',
'  try{',
'    if(action==="getAll")result=getAllData();',
'    else if(action==="saveBookings"){saveSheet("予約表",JSON.parse(body.rows));result={ok:true};}',
'    else if(action==="saveCustomers"){saveSheet("患者",JSON.parse(body.rows));result={ok:true};}',
'    else if(action==="saveUriage"){saveSheet("売上",JSON.parse(body.rows));result={ok:true};}',
'    else if(action==="resetBookings"){resetBookings();result={ok:true};}',
'    else if(action==="lineNotifyV2")result=sendLineMessagingAPI(body.token,body.userId,body.message);',
'    else if(action==="saveLineSettings"){saveLineSettings();result={ok:true};}',
'    else if(action==="getLineUsers")result=getLineUsers();',
'    else result={ok:false,error:"unknown action"};',
'  }catch(err){result={ok:false,error:err.message};}',
'  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);',
'}',
'function saveLineUserId(userId,displayName,message){',
'  var ss=SpreadsheetApp.getActiveSpreadsheet();',
'  var s=ss.getSheetByName("LINE_IDs");',
'  if(!s){s=ss.insertSheet("LINE_IDs");s.getRange(1,1,1,4).setValues([["userId","表示名","最終MSG","更新日"]]);}',
'  var data=s.getDataRange().getValues();',
'  var now=new Date();',
'  for(var i=1;i<data.length;i++){',
'    if(data[i][0]===userId){s.getRange(i+1,2,1,3).setValues([[displayName||data[i][1],message,now]]);return;}',
'  }',
'  s.appendRow([userId,displayName,message,now]);',
'}',
'function getLineUsers(){',
'  var s=SpreadsheetApp.getActiveSpreadsheet().getSheetByName("LINE_IDs");',
'  if(!s)return{ok:true,users:[]};',
'  var users=s.getDataRange().getValues().slice(1).map(function(r){return{userId:r[0],name:String(r[1]),lastMsg:String(r[2])};});',
'  return{ok:true,users:users};',
'}',
'function getAllData(){',
'  var ss=SpreadsheetApp.getActiveSpreadsheet();',
'  var b=ss.getSheetByName("予約表"),c=ss.getSheetByName("患者"),u=ss.getSheetByName("売上");',
'  return{ok:true,',
'    bookings:b?b.getDataRange().getValues():[[]],',
'    customers:c?c.getDataRange().getValues():[[]],',
'    uriage:u?u.getDataRange().getValues():[[]]};',
'}',
'function saveSheet(name,rows){',
'  var ss=SpreadsheetApp.getActiveSpreadsheet();',
'  var s=ss.getSheetByName(name)||ss.insertSheet(name);',
'  s.clearContents();',
'  if(!rows||!rows.length)return;',
'  var san=rows.map(function(row){return row.map(function(c){',
'    if(c===null||c===undefined)return"";',
'    if(c instanceof Date){',
'      var y=c.getFullYear(),m=String(c.getMonth()+1).padStart(2,"0"),d=String(c.getDate()).padStart(2,"0");',
'      return y+"-"+m+"-"+d;',
'    }',
'    return String(c);',
'  });});',
'  var rng=s.getRange(1,1,san.length,san[0].length);',
'  rng.setNumberFormats(san.map(function(r){return r.map(function(){return"@";});}));',
'  rng.setValues(san);',
'}',
'function resetBookings(){',
'  var ss=SpreadsheetApp.getActiveSpreadsheet();',
'  var s=ss.getSheetByName("予約表")||ss.insertSheet("予約表");',
'  s.clearContents();',
'  s.getRange(1,1,1,20).setValues([["日付","時間","区分","患者名","診察券No","予約ルート","来院回数","経過日数","症状","オプション","自費メニュー","処置(JSON)","処置メモ","物販(JSON)","支払方法","支払金額","区分リスト","再予約情報","キャンセル理由","施術部位"]]);',
'}',
'function saveLineSettings(){',
'  var p=PropertiesService.getScriptProperties();',
'  p.setProperty("LINE_TOKEN","RomnT7om/ytYjz1dicHgMbaxHZvnccCeBP6C3FX1s1TtiCW1ME3X3fK098wacBfDttVgnMM4jZPRN6G+RWRmYrkZUW+qkEjlugm5FVNagj5WOfwINV6NqEoNCH9OVbI7qViP6XzF3GEYdjWGHQvIsgdB04t89/1O/w1cDnyilFU=");',
'  p.setProperty("LINE_USER_ID","U9f7333eed2d51ceba13641059e8bd341");',
'  Logger.log("LINE設定保存完了");',
'}',
'function dailyLineAlert(){',
'  var p=PropertiesService.getScriptProperties();',
'  var token=p.getProperty("LINE_TOKEN"),ownerId=p.getProperty("LINE_USER_ID");',
'  if(!token||!ownerId){Logger.log("トークン未設定");return;}',
'  var ss=SpreadsheetApp.getActiveSpreadsheet();',
'  var today=new Date();today.setHours(0,0,0,0);',
'  var alerts=[];',
'  var bs=ss.getSheetByName("予約表");',
'  if(bs){',
'    var bd=bs.getDataRange().getValues(),bh=bd[0];',
'    var di=bh.indexOf("日付"),ni=bh.indexOf("患者名"),ii=bh.indexOf("診察券No"),ki=bh.indexOf("区分");',
'    if(di>-1){',
'      var lv={};',
'      bd.slice(1).forEach(function(r){',
'        var k=String(r[ki]||"");',
'        if(k.indexOf("継続")>-1||k.indexOf("キャンセル")>-1)return;',
'        var dv=r[di];if(!dv)return;',
'        var d=dv instanceof Date?new Date(dv):new Date(String(dv));',
'        if(isNaN(d.getTime()))return;',
'        d.setHours(0,0,0,0);if(d>today)return;',
'        var key=String(r[ii]||"")||String(r[ni]||"");',
'        if(!lv[key]||d>lv[key].date)lv[key]={date:d,name:String(r[ni]||""),id:String(r[ii]||"")};',
'      });',
'      Object.values(lv).forEach(function(v){',
'        var diff=Math.floor((today-v.date)/(1000*60*60*24));',
'        if(diff>=20&&diff<=21)alerts.push("・"+v.name+"（"+v.id+"号）前回:"+Utilities.formatDate(v.date,"Asia/Tokyo","M/d")+" "+diff+"日経過");',
'      });',
'    }',
'  }',
'  if(alerts.length){',
'    sendLineMessagingAPI(token,ownerId,"【倉治整骨院】\n⚠️ 初診料発生アラート\n"+Utilities.formatDate(today,"Asia/Tokyo","M月d日(E)")+"\n\n"+alerts.join("\n")+"\n\n→ 来院を促してください！");',
'    Logger.log("アラート送信:"+alerts.length+"件");',
'  }else{',
'    Logger.log("対象なし（本日 "+Utilities.formatDate(today,"Asia/Tokyo","M/d")+")");',
'  }',
'}',
'function sendDayBeforeReminders(){',
'  var p=PropertiesService.getScriptProperties();',
'  var token=p.getProperty("LINE_TOKEN"),ownerId=p.getProperty("LINE_USER_ID");',
'  if(!token){Logger.log("トークン未設定");return;}',
'  var ss=SpreadsheetApp.getActiveSpreadsheet();',
'  var today=new Date();today.setHours(0,0,0,0);',
'  var tmr=new Date(today);tmr.setDate(tmr.getDate()+1);',
'  var tmrStr=Utilities.formatDate(tmr,"Asia/Tokyo","yyyy-MM-dd");',
'  var tmrDisp=Utilities.formatDate(tmr,"Asia/Tokyo","M月d日(E)");',
'  var lu={};',
'  var ls=ss.getSheetByName("LINE_IDs");',
'  if(ls)ls.getDataRange().getValues().slice(1).forEach(function(r){if(r[0]&&r[1])lu[String(r[1]).trim()]=String(r[0]);});',
'  var bs=ss.getSheetByName("予約表");',
'  if(!bs){Logger.log("予約表なし");return;}',
'  var bd=bs.getDataRange().getValues(),bh=bd[0];',
'  var di=bh.indexOf("日付"),ti=bh.indexOf("時間"),ni=bh.indexOf("患者名"),ki=bh.indexOf("区分");',
'  if(di<0){Logger.log("ヘッダー未発見");return;}',
'  var bp={},seen={};',
'  bd.slice(1).forEach(function(r){',
'    var dv=String(r[di]||"").trim(),k=String(r[ki]||"");',
'    if(k.indexOf("継続")>-1||k.indexOf("キャンセル")>-1||dv!==tmrStr)return;',
'    var n=String(r[ni]||"").trim(),t=String(r[ti]||"").trim();',
'    if(!n||!t||seen[n+"_"+t])return;',
'    seen[n+"_"+t]=true;',
'    if(!bp[n])bp[n]=[];',
'    bp[n].push(t);',
'  });',
'  if(!Object.keys(bp).length){Logger.log("明日の予約なし");return;}',
'  var sent=0,skip=[];',
'  Object.keys(bp).forEach(function(name){',
'    var tid=lu[name];',
'    if(!tid){',
'      var ln=name.split(/[　 ]/)[0];',
'      var fk=Object.keys(lu).find(function(k){return k.replace(/[　 ]/g,"").indexOf(ln)===0;});',
'      if(fk)tid=lu[fk];',
'    }',
'    if(!tid){skip.push(name);return;}',
'    var msg="【倉治整骨院】\n"+tmrDisp+"のご予約リマインドです\n\n⏰ "+bp[name].join(" / ")+"\n\nお気をつけてお越しください。\n※自動送信のため返信不要です。";',
'    if(sendLineMessagingAPI(token,tid,msg).ok)sent++;else skip.push(name+"(エラー)");',
'  });',
'  Logger.log("リマインド完了 送信:"+sent+"件 未登録:"+skip.length+"件");',
'  if(ownerId){',
'    var s="【倉治整骨院】\n前日リマインド完了\n"+tmrDisp+"\n送信:"+sent+"件";',
'    if(skip.length)s+="\nLINE未登録:\n・"+skip.join("\n・");',
'    sendLineMessagingAPI(token,ownerId,s);',
'  }',
'}',
'function setupAllTriggers(){',
'  ScriptApp.getProjectTriggers().forEach(function(t){ScriptApp.deleteTrigger(t);});',
'  ScriptApp.newTrigger("dailyLineAlert").timeBased().everyDays(1).atHour(8).create();',
'  ScriptApp.newTrigger("sendDayBeforeReminders").timeBased().everyDays(1).atHour(18).create();',
'  Logger.log("トリガー設定完了：毎朝8時+毎日18時");',
'}',
'function sendLineMessagingAPI(token,userId,message){',
'  if(!token||!userId||!message)return{ok:false,error:"missing"};',
'  try{',
'    var res=UrlFetchApp.fetch("https://api.line.me/v2/bot/message/push",{',
'      method:"post",',
'      headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},',
'      payload:JSON.stringify({to:userId,messages:[{type:"text",text:message}]})',
'    });',
'    return{ok:res.getResponseCode()===200};',
'  }catch(e){return{ok:false,error:e.message};}',
'}'
  ].join('\n');
}

function copyGAS(){
  const code = getGASCode();
  navigator.clipboard.writeText(code).then(()=>{
    const st=document.getElementById('status');
    st.className='ok';st.style.display='block';
    st.textContent='✅ コピーしました！Apps Scriptに貼り付けてください。';
    document.querySelector('.btn-copy').textContent='✅ コピー済み！';
    document.querySelector('.btn-copy').style.background='#22c55e';
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=getGASCode();document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    document.getElementById('status').className='ok';
    document.getElementById('status').style.display='block';
    document.getElementById('status').textContent='✅ コピーしました！';
  });
}

function downloadGAS(){
  const blob=new Blob([getGASCode()],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='kuraji_gas.gs';
  a.click();
  document.getElementById('status').className='ok';
  document.getElementById('status').style.display='block';
  document.getElementById('status').textContent='✅ ダウンロードしました！Apps Scriptに内容を貼り付けてください。';
}
</script>
</body>
</html>
