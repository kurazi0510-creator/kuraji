<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>全データ復元ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans',sans-serif;background:#0f172a;min-height:100vh;padding:20px;display:flex;align-items:flex-start;justify-content:center;}
.card{background:white;border-radius:16px;padding:28px;max-width:600px;width:100%;margin-top:20px;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
h1{font-size:1.2rem;color:#dc2626;margin-bottom:6px;}
.sub{font-size:0.82rem;color:#64748b;margin-bottom:20px;line-height:1.6;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:10px;font-size:0.95rem;font-weight:bold;cursor:pointer;margin-bottom:10px;}
.btn-red{background:#dc2626;color:white;}
.btn-orange{background:#ea580c;color:white;}
.btn-green{background:#16a34a;color:white;}
.btn:disabled{background:#94a3b8;color:white;cursor:not-allowed;}
#status{padding:16px;border-radius:10px;font-size:0.88rem;font-weight:bold;margin-top:16px;display:none;line-height:1.8;}
.ok{background:#dcfce7;color:#166534;}
.err{background:#fee2e2;color:#991b1b;}
.ing{background:#dbeafe;color:#1e40af;}
#log{margin-top:12px;font-size:0.72rem;color:#374151;max-height:300px;overflow-y:auto;background:#f8fafc;padding:12px;border-radius:8px;display:none;line-height:2;}
.info{background:#fef9c3;border:1.5px solid #fde047;border-radius:8px;padding:12px;font-size:0.82rem;color:#713f12;margin-bottom:16px;line-height:1.7;}
.state-box{border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:16px;}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:0.85rem;}
.row:last-child{border-bottom:none;}
.label{color:#64748b;}
.val{font-weight:bold;color:#1e293b;}
</style>
</head>
<body>
<div class="card">
  <h1>🚨 全データ復元ツール</h1>
  <p class="sub">GASから患者データ・予約データを取得してlocalStorageに復元します。</p>

  <div class="info">
    ⚠️ GASのコード更新＆デプロイが完了してから実行してください。<br>
    gas_copy.html → コピー → Apps Script貼付け → 保存 → デプロイ（新バージョン）
  </div>

  <div class="state-box">
    <div style="font-size:0.8rem;font-weight:bold;color:#64748b;margin-bottom:8px">📱 現在のlocalStorage</div>
    <div id="current-rows">確認中...</div>
  </div>

  <button class="btn btn-red" id="btn-restore" onclick="restoreAll()">🔄 GASから全データを復元する</button>
  <button class="btn btn-orange" id="btn-stop" onclick="stopTriggers()">🛑 LINE自動送信を今すぐ停止する</button>

  <div id="status"></div>
  <div id="log"></div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbytM-3C2aJtZp4sbaNDuM4-QR11qOSsvTlBwhj1wzCtppckrXIxE5rIB8ONju4O9XQgUQ/exec';

function addLog(msg){const el=document.getElementById('log');el.style.display='block';el.innerHTML+=msg+'<br>';el.scrollTop=el.scrollHeight;}
function setStatus(msg,cls){const el=document.getElementById('status');el.style.display='block';el.className=cls;el.innerHTML=msg;}
function setAllBtns(d){['btn-restore','btn-stop'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=d;});}

function checkCurrent(){
  try{
    const p=JSON.parse(localStorage.getItem('kj_p')||'[]');
    const b=JSON.parse(localStorage.getItem('kj_b')||'{}');
    document.getElementById('current-rows').innerHTML=
      `<div class="row"><span class="label">患者数</span><span class="val">${p.length}名</span></div>`+
      `<div class="row"><span class="label">予約データ</span><span class="val">${Object.keys(b).length}日分</span></div>`;
  }catch(e){document.getElementById('current-rows').textContent='確認エラー';}
}

function normTel(t){if(!t)return'';t=String(t).replace(/[^0-9]/g,'');if(t.length>=10&&!t.startsWith('0'))t='0'+t;return t;}
function fmtDate(v){
  if(!v)return'';
  try{
    const s=String(v).trim();
    if(!s||s==='-'||s.includes('NaN'))return'';
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    const d=new Date(s);
    if(!isNaN(d.getTime()))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }catch(e){}return'';
}

async function gasPost(action){
  const res=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action}),redirect:'follow'});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const raw=await res.text();
  addLog(action+': '+raw.length+'文字受信');
  let d;try{d=JSON.parse(raw);}catch(e){throw new Error('JSONパースエラー: '+raw.slice(0,120));}
  if(!d.ok)throw new Error(d.error||action+'エラー');
  return d;
}

function parsePatients(rows){
  if(!rows||rows.length<=1)return[];
  const h=rows[0].map(x=>String(x||'').trim());
  const hi=k=>h.indexOf(k);
  const gv=(r,k,fb)=>{const i=hi(k);return String((i>-1?r[i]:(fb!=null?r[fb]:'')||'')).trim();};
  const isAddr=v=>v&&(String(v).includes('市')||String(v).includes('町')||/\d+-\d+/.test(String(v)));
  return rows.slice(1).filter(r=>r[0]!=null&&String(r[0]).trim()&&String(r[1]||'').trim()).map(r=>{
    const id=String(r[0]).trim(),name=String(r[1]).trim();
    const lineUidI=hi('LINEユーザーID');
    const lineUid=lineUidI>-1?String(r[lineUidI]||'').trim():'';
    const lineRaw=hi('LINE')>-1?String(r[hi('LINE')]||'').trim():'';
    const line=(lineRaw==='あり'||lineRaw==='なし'||lineRaw==='-')?lineRaw:'';
    const cityH=hi('住所')>-1?String(r[hi('住所')]||'').trim():'';
    const city=isAddr(cityH)?cityH:isAddr(String(r[4]||'').trim())?String(r[4]).trim():cityH;
    const jobR=gv(r,'職業',5);const job=isAddr(jobR)?'':jobR;
    const cntI=hi('通院回数');const cntN=parseInt(cntI>-1?r[cntI]:0)||0;const cnt=cntN>1900?0:cntN;
    const dobI=hi('生年月日');const dobR=dobI>-1?r[dobI]:r[11];
    const dob=(()=>{if(!dobR)return'';const s=String(dobR).trim();if(!s||s.includes('NaN')||s==='-')return'';if(/^\d{4}$/.test(s))return s+'-01-01';if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;return fmtDate(dobR)||'';})();
    return{id,name,kana:gv(r,'ふりがな',2),sex:gv(r,'性別',3),tel:normTel(gv(r,'電話番号',4).replace(/[^0-9]/g,'')),
      line,lineUid,city,job,src:gv(r,'流入元',6),symptom:gv(r,'症状',8),
      last:fmtDate(hi('前回通院日')>-1?r[hi('前回通院日')]:r[9]),count:cnt,dob,note:gv(r,'備考',12)};
  });
}

function parseBookings(rows){
  if(!rows||rows.length<=1)return{};
  const h=rows[0].map(x=>String(x||'').trim());
  const hi=k=>h.indexOf(k);
  const di=hi('日付'),ti=hi('時刻')>-1?hi('時刻'):hi('時間'),ni=hi('患者名'),ii=hi('診察券No'),ki=hi('区分'),mi=hi('メモ')>-1?hi('メモ'):hi('備考');
  const bk={};
  rows.slice(1).forEach(r=>{
    if(!r[di>-1?di:0])return;
    const dateStr=fmtDate(di>-1?r[di]:r[0]);
    if(!dateStr)return;
    const timeStr=String(ti>-1?r[ti]:r[1]||'').trim();
    if(!timeStr)return;
    if(!bk[dateStr])bk[dateStr]={};
    if(!bk[dateStr][timeStr])bk[dateStr][timeStr]=[];
    const kubun=String(ki>-1?r[ki]:r[4]||'').trim();
    const cancelR=h.indexOf('キャンセル理由')>-1?String(r[h.indexOf('キャンセル理由')]||'').trim():'';
    bk[dateStr][timeStr].push({
      id:String(ii>-1?r[ii]:r[2]||'').trim(),
      name:String(ni>-1?r[ni]:r[3]||'').trim(),
      kubun,memo:String(mi>-1?r[mi]:r[5]||'').trim(),
      fee:parseInt(r[6])||0,payMethod:String(r[7]||'').trim(),
      cancelReason:cancelR,status:cancelR?'cancel':'booked'
    });
  });
  return bk;
}

async function stopTriggers(){
  setAllBtns(true);
  setStatus('🛑 LINE自動送信を停止中...','ing');
  try{
    const d=await gasPost('deleteAllTriggers');
    setStatus('✅ LINE自動送信を停止しました（'+d.deleted+'件のトリガーを削除）','ok');
  }catch(e){
    setStatus('❌ '+e.message+'<br>GASのデプロイが完了しているか確認してください','err');
  }finally{setAllBtns(false);}
}

async function restoreAll(){
  setAllBtns(true);
  document.getElementById('log').innerHTML='';
  setStatus('🔄 GASからデータ取得中...','ing');
  try{
    addLog('--- 患者データ取得 ---');
    const pd=await gasPost('getRawPatients');
    const patients=parsePatients(pd.rows);
    addLog('患者パース: '+patients.length+'件');
    if(patients.length===0)throw new Error('患者データ0件。GASのデプロイを確認してください');

    addLog('--- 予約データ取得 ---');
    const bd=await gasPost('getRawBookings');
    const bookings=parseBookings(bd.rows);
    const bDays=Object.keys(bookings).length;
    addLog('予約パース: '+bDays+'日分');

    // 既存データとマージ
    let existingP=[];try{existingP=JSON.parse(localStorage.getItem('kj_p')||'[]');}catch(e){}
    const gasIds=new Set(patients.map(p=>String(p.id)));
    const merged=patients.map(np=>{const old=existingP.find(ep=>String(ep.id)===String(np.id));return old?Object.assign({},old,np):np;});
    const onlyLocal=existingP.filter(p=>!gasIds.has(String(p.id)));
    const finalP=[...merged,...onlyLocal];

    localStorage.setItem('kj_p',JSON.stringify(finalP));
    addLog('✅ 患者書き込み: '+finalP.length+'件');

    if(bDays>0){
      let existingB={};try{existingB=JSON.parse(localStorage.getItem('kj_b')||'{}');}catch(e){}
      const mergedB=Object.assign({},existingB,bookings);
      localStorage.setItem('kj_b',JSON.stringify(mergedB));
      localStorage.setItem('kj_b_bak',JSON.stringify(mergedB));
      addLog('✅ 予約書き込み: '+Object.keys(mergedB).length+'日分');
    }

    // LINE自動送信も停止
    try{await gasPost('deleteAllTriggers');addLog('✅ LINE自動送信トリガー停止');}catch(e){addLog('⚠ トリガー停止スキップ: '+e.message);}

    setStatus('✅ 復元完了！<br>👤 患者: <strong>'+finalP.length+'名</strong><br>📅 予約: <strong>'+bDays+'日分</strong><br>🛑 LINE自動送信: 停止済み<br><br>3秒後に管理画面へ移動...','ok');
    checkCurrent();
    setTimeout(()=>{location.href='kanri.html';},3000);
  }catch(e){
    setStatus('❌ エラー: '+e.message,'err');
    addLog('エラー詳細: '+e.message);
    setAllBtns(false);
  }
}

checkCurrent();
</script>
</body>
</html>
