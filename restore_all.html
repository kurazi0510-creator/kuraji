<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>全データ復元ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans',sans-serif;background:#0f172a;min-height:100vh;padding:20px;display:flex;align-items:flex-start;justify-content:center;}
.card{background:white;border-radius:16px;padding:28px;max-width:600px;width:100%;margin-top:20px;box-shadow:0 8px 40px rgba(0,0,0,0.4);}
h1{font-size:1.2rem;color:#dc2626;margin-bottom:6px;}
.sub{font-size:0.82rem;color:#64748b;margin-bottom:20px;line-height:1.6;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:10px;font-size:0.95rem;font-weight:bold;cursor:pointer;margin-bottom:10px;}
.btn-red{background:#dc2626;color:white;}
.btn-orange{background:#ea580c;color:white;}
.btn:disabled{background:#94a3b8;color:white;cursor:not-allowed;}
#status{padding:16px;border-radius:10px;font-size:0.88rem;font-weight:bold;margin-top:16px;display:none;line-height:1.8;}
.ok{background:#dcfce7;color:#166534;}
.err{background:#fee2e2;color:#991b1b;}
.ing{background:#dbeafe;color:#1e40af;}
#log{margin-top:12px;font-size:0.72rem;color:#374151;max-height:300px;overflow-y:auto;background:#f8fafc;padding:12px;border-radius:8px;display:none;line-height:2;}
.state-box{border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:16px;}
.row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:0.85rem;}
.row:last-child{border-bottom:none;}
.label{color:#64748b;}.val{font-weight:bold;color:#1e293b;}
</style>
</head>
<body>
<div class="card">
  <h1>🚨 全データ復元ツール</h1>
  <p class="sub">スプレッドシートから患者・予約・売上データを全て復元します。<br>GASのデプロイ完了後に実行してください。</p>

  <div class="state-box">
    <div style="font-size:0.8rem;font-weight:bold;color:#64748b;margin-bottom:8px">📱 現在のlocalStorage</div>
    <div id="current-rows">確認中...</div>
  </div>

  <button class="btn btn-red" id="btn-restore" onclick="restoreAll()">🔄 スプレッドシートから全データを復元する</button>
  <button class="btn btn-orange" id="btn-stop" onclick="stopTriggers()">🛑 LINE自動送信を停止する</button>

  <div id="status"></div>
  <div id="log"></div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbytM-3C2aJtZp4sbaNDuM4-QR11qOSsvTlBwhj1wzCtppckrXIxE5rIB8ONju4O9XQgUQ/exec';

function addLog(msg){const el=document.getElementById('log');el.style.display='block';el.innerHTML+=msg+'<br>';el.scrollTop=el.scrollHeight;}
function setStatus(msg,cls){const el=document.getElementById('status');el.style.display='block';el.className=cls;el.innerHTML=msg;}
function setAllBtns(d){['btn-restore','btn-stop'].forEach(id=>{const b=document.getElementById(id);if(b)b.disabled=d;});}

function checkCurrent(){
  try{
    const p=JSON.parse(localStorage.getItem('kj_p')||'[]');
    const b=JSON.parse(localStorage.getItem('kj_b')||'{}');
    const u=JSON.parse(localStorage.getItem('kj_u')||'{}');
    document.getElementById('current-rows').innerHTML=
      `<div class="row"><span class="label">患者数</span><span class="val">${p.length}名</span></div>`+
      `<div class="row"><span class="label">予約データ</span><span class="val">${Object.keys(b).length}日分</span></div>`+
      `<div class="row"><span class="label">売上データ</span><span class="val">${Object.keys(u).length}件</span></div>`;
  }catch(e){document.getElementById('current-rows').textContent='確認エラー';}
}

function normTel(t){if(!t)return'';t=String(t).replace(/[^0-9]/g,'');if(t.length>=10&&!t.startsWith('0'))t='0'+t;return t;}
function fmtDate(v){
  if(!v)return'';
  try{
    if(v instanceof Date){if(isNaN(v))return'';const y=v.getFullYear();if(y<1900||y>2100)return'';return y+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');}
    const s=String(v).trim();
    if(!s||s==='-'||s.includes('NaN'))return'';
    if(/^\d{4}-\d{2}-\d{2}$/.test(s)){const y=parseInt(s);if(y<1900||y>2100)return'';return s;}
    const d=new Date(s);
    if(!isNaN(d.getTime())&&d.getFullYear()>1900&&d.getFullYear()<2100)return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }catch(e){}return'';
}

async function gasPost(action){
  const res=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action}),redirect:'follow'});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const raw=await res.text();
  addLog(action+': '+raw.length+'文字受信');
  let d;try{d=JSON.parse(raw);}catch(e){throw new Error('JSONパースエラー。GASのデプロイを確認してください。受信内容: '+raw.slice(0,80));}
  if(!d.ok)throw new Error(d.error||action+'エラー');
  return d;
}

function parsePatients(rows){
  if(!rows||rows.length<=1){addLog('⚠ 患者データなし');return[];}
  const h=rows[0].map(x=>String(x||'').trim());
  addLog('患者ヘッダー('+h.length+'列): '+h.slice(0,8).join('|'));
  const hi=k=>h.indexOf(k);
  const gv=(r,k,fb)=>{const i=hi(k);return String((i>-1?r[i]:(fb!=null&&fb<r.length?r[fb]:'')||'')).trim();};
  const isAddr=v=>v&&(String(v).includes('市')||String(v).includes('町')||/\d+-\d+/.test(String(v)));
  const result=[];
  rows.slice(1).forEach((r,ri)=>{
    const id=String(r[0]||'').trim();
    const name=String(r[1]||'').trim();
    if(!id||!name||id==='診察券No')return;
    const lineUidI=hi('LINEユーザーID');
    const lineUid=lineUidI>-1?String(r[lineUidI]||'').trim():'';
    const lineRaw=hi('LINE')>-1?String(r[hi('LINE')]||'').trim():'';
    const line=(lineRaw==='あり'||lineRaw==='なし'||lineRaw==='-')?lineRaw:'';
    const cityH=hi('住所')>-1?String(r[hi('住所')]||'').trim():'';
    const city=isAddr(cityH)?cityH:(isAddr(String(r[4]||'').trim())?String(r[4]).trim():cityH);
    const jobR=gv(r,'職業',5);const job=isAddr(jobR)?'':jobR;
    const cntI=hi('通院回数');const cntN=parseInt(cntI>-1?r[cntI]:0)||0;const cnt=cntN>1900?0:cntN;
    const dobI=hi('生年月日');const dobR=dobI>-1?r[dobI]:(r.length>11?r[11]:'');
    const dob=(()=>{
      if(!dobR)return'';const s=String(dobR).trim();
      if(!s||s.includes('NaN')||s==='-')return'';
      if(/^\d{4}$/.test(s))return s+'-01-01';
      return fmtDate(dobR)||'';
    })();
    const lastI=hi('前回通院日');const lastR=lastI>-1?r[lastI]:(r.length>9?r[9]:'');
    result.push({id,name,kana:gv(r,'ふりがな',2),sex:gv(r,'性別',3),
      tel:normTel(gv(r,'電話番号',4).replace(/[^0-9]/g,'')),
      line,lineUid,city,job,src:gv(r,'流入元',6),symptom:gv(r,'症状',8),
      last:fmtDate(lastR),count:cnt,dob,note:gv(r,'備考',12)});
  });
  addLog('患者パース完了: '+result.length+'件');
  return result;
}

function parseBookings(rows){
  if(!rows||rows.length<=1){addLog('⚠ 予約データなし');return{};}
  const h=rows[0].map(x=>String(x||'').trim());
  addLog('予約ヘッダー('+h.length+'列): '+h.slice(0,10).join('|'));
  const hi=k=>h.indexOf(k);
  // kanri.htmlのpushBの列構造に完全対応
  // [0]日付,[1]時間,[2]区分,[3]患者名,[4]診察券No,[5]予約ルート,[6]来院回数,[7]経過日数
  // [8]症状,[9]オプション,[10]自費メニュー,[11]処置JSON,[12]処置メモ,[13]物販JSON
  // [14]支払方法,[15]支払金額,[16]区分リスト,[17]再予約情報,[18]キャンセル理由,[19]施術部位
  const di=hi('日付')>-1?hi('日付'):0;
  const ti=hi('時間')>-1?hi('時間'):(hi('時刻')>-1?hi('時刻'):1);
  const ki=hi('区分')>-1?hi('区分'):2;
  const ni=hi('患者名')>-1?hi('患者名'):3;
  const ii=hi('診察券No')>-1?hi('診察券No'):4;
  const bk={};
  let cnt=0;
  rows.slice(1).forEach(r=>{
    const dateStr=fmtDate(r[di]);
    if(!dateStr)return;
    const timeStr=String(r[ti]||'').trim();
    if(!timeStr)return;
    const kubun=String(r[ki]||'').trim();
    const name=String(r[ni]||'').trim();
    const cardId=String(r[ii]||'').trim();
    if(!name&&!cardId)return;

    if(!bk[dateStr])bk[dateStr]={};

    const cancelR=hi('キャンセル理由')>-1?String(r[hi('キャンセル理由')]||'').trim():'';
    const reBookedBy=hi('再予約情報')>-1?String(r[hi('再予約情報')]||'').trim():'';

    // 継続枠
    if(kubun==='(継続)'||kubun.includes('継続')){
      bk[dateStr][timeStr]={cont:true,name,cardId};
      cnt++;return;
    }
    // キャンセル
    if(kubun==='(キャンセル)'||cancelR){
      bk[dateStr][timeStr]={
        cancelled:true,name,cardId,
        cancelReason:cancelR,reBookedBy,
        kubun:kubun.replace('(キャンセル)','').trim()||'自費'
      };
      cnt++;return;
    }
    // 通常予約
    let shochi=[];let bussan=[];
    try{shochi=JSON.parse(String(r[11]||'[]'));}catch(e){}
    try{bussan=JSON.parse(String(r[13]||'[]'));}catch(e){}
    bk[dateStr][timeStr]={
      name,cardId,
      kubun:kubun||'自費',
      route:String(r[5]||'').trim(),
      visitCount:parseInt(r[6])||0,
      elapsed:parseInt(r[7])||0,
      symptom:String(r[8]||'').trim(),
      option:String(r[9]||'').trim(),
      menu:String(r[10]||'').trim(),
      shochi,
      shochiMemo:String(r[12]||'').trim(),
      bussan,
      payMethod:String(r[hi('支払方法')>-1?hi('支払方法'):14]||'').trim(),
      fee:parseInt(r[hi('支払金額')>-1?hi('支払金額'):15])||0,
      kubunList:String(r[16]||'').trim(),
      bui:String(r[hi('施術部位')>-1?hi('施術部位'):19]||'').split(',').filter(Boolean)
    };
    cnt++;
  });
  addLog('予約パース完了: '+Object.keys(bk).length+'日分 '+cnt+'件');
  return bk;
}

function parseUriage(rows){
  if(!rows||rows.length<=1){addLog('⚠ 売上データなし');return{};}
  const h=rows[0].map(x=>String(x||'').trim());
  addLog('売上ヘッダー('+h.length+'列): '+h.slice(0,6).join('|'));
  const hi=k=>h.indexOf(k);
  const u={};
  rows.slice(1).forEach(r=>{
    const dateStr=fmtDate(r[0]);
    if(!dateStr)return;
    if(!u[dateStr])u[dateStr]=[];
    u[dateStr].push({
      id:String(r[hi('診察券No')>-1?hi('診察券No'):1]||'').trim(),
      name:String(r[hi('患者名')>-1?hi('患者名'):2]||'').trim(),
      fee:parseInt(r[hi('金額')>-1?hi('金額'):3])||0,
      method:String(r[hi('支払方法')>-1?hi('支払方法'):4]||'').trim(),
      memo:String(r[hi('メモ')>-1?hi('メモ'):5]||'').trim()
    });
  });
  addLog('売上パース完了: '+Object.keys(u).length+'日分');
  return u;
}

async function stopTriggers(){
  setAllBtns(true);
  setStatus('🛑 LINE自動送信を停止中...','ing');
  try{
    const d=await gasPost('deleteAllTriggers');
    setStatus('✅ LINE自動送信を停止しました（'+d.deleted+'件のトリガーを削除）','ok');
  }catch(e){
    setStatus('❌ '+e.message,'err');
  }finally{setAllBtns(false);}
}

async function restoreAll(){
  setAllBtns(true);
  document.getElementById('log').innerHTML='';
  setStatus('🔄 スプレッドシートからデータ取得中...','ing');
  try{
    const d=await gasPost('getFullData');

    const patients=parsePatients(d.patients);
    if(patients.length===0)throw new Error('患者データが0件。GASのデプロイを確認してください');

    const bookings=parseBookings(d.bookings);
    const uriage=parseUriage(d.uriage);

    // 既存とマージ（既存データを優先しつつGASデータで補完）
    let existingP=[];try{existingP=JSON.parse(localStorage.getItem('kj_p')||'[]');}catch(e){}
    const gasIds=new Set(patients.map(p=>String(p.id)));
    const merged=patients.map(np=>{
      const old=existingP.find(ep=>String(ep.id)===String(np.id));
      if(old){
        // GASのデータを基本にしつつ、localStorageにしかないフィールドを保持
        return Object.assign({},old,np,{
          lineUid:np.lineUid||old.lineUid||'',
          note:np.note||old.note||''
        });
      }
      return np;
    });
    const onlyLocal=existingP.filter(p=>!gasIds.has(String(p.id)));
    const finalP=[...merged,...onlyLocal];

    localStorage.setItem('kj_p',JSON.stringify(finalP));
    addLog('✅ 患者localStorage書き込み: '+finalP.length+'件');

    const bDays=Object.keys(bookings).length;
    if(bDays>0){
      let existingB={};try{existingB=JSON.parse(localStorage.getItem('kj_b')||'{}');}catch(e){}
      const mergedB=Object.assign({},existingB,bookings);
      localStorage.setItem('kj_b',JSON.stringify(mergedB));
      localStorage.setItem('kj_b_bak',JSON.stringify(mergedB));
      addLog('✅ 予約localStorage書き込み: '+Object.keys(mergedB).length+'日分');
    }

    const uDays=Object.keys(uriage).length;
    if(uDays>0){
      localStorage.setItem('kj_u',JSON.stringify(uriage));
      addLog('✅ 売上localStorage書き込み: '+uDays+'日分');
    }

    // GASの患者シートに61名を書き戻す（syncAllで上書きされないように）
    addLog('--- GAS患者シートに書き戻し中 ---');
    const hdr=['診察券No','患者名','ふりがな','性別','電話番号','LINE','LINEユーザーID','住所','職業','流入元','症状','前回通院日','通院回数','生年月日','備考'];
    const rows=[hdr,...finalP.map(p=>[
      p.id,p.name,p.kana||'',p.sex||'',
      p.tel||'',p.line||'',p.lineUid||'',
      p.city||'',p.job||'',p.src||'',
      p.symptom||'',p.last||'',p.count||0,p.dob||'',p.note||''
    ])];
    try{
      const saveRes=await fetch(GAS,{method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'saveCustomers',rows:JSON.stringify(rows)}),redirect:'follow'});
      const saveD=JSON.parse(await saveRes.text());
      if(saveD.ok){addLog('✅ GAS患者シート書き戻し完了: '+finalP.length+'件');}
      else{addLog('⚠ GAS書き戻しエラー: '+JSON.stringify(saveD));}
    }catch(e){addLog('⚠ GAS書き戻しスキップ: '+e.message);}

    // LINE停止も同時実行
    try{await gasPost('deleteAllTriggers');addLog('✅ LINE自動送信停止完了');}catch(e){addLog('⚠ LINE停止スキップ: '+e.message);}

    setStatus(
      '✅ 復元完了！<br>'+
      '👤 患者: <strong>'+finalP.length+'名</strong><br>'+
      '📅 予約: <strong>'+bDays+'日分</strong><br>'+
      '💰 売上: <strong>'+uDays+'日分</strong><br>'+
      '🛑 LINE自動送信: 停止済み<br><br>'+
      '3秒後に管理画面へ移動します...','ok');
    checkCurrent();
    setTimeout(()=>{location.href='kanri.html';},3000);
  }catch(e){
    setStatus('❌ エラー: '+e.message,'err');
    addLog('エラー詳細: '+e.message);
    setAllBtns(false);
  }
}

checkCurrent();
</script>
</body>
</html>
