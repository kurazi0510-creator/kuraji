<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>患者データ復元ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Sans',sans-serif;background:#f1f5f9;min-height:100vh;padding:20px;}
.card{background:white;border-radius:16px;padding:28px;max-width:560px;margin:0 auto;box-shadow:0 8px 32px rgba(0,0,0,0.12);}
h1{font-size:1.2rem;color:#1e293b;margin-bottom:6px;}
.sub{font-size:0.82rem;color:#64748b;margin-bottom:20px;line-height:1.6;}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:0.95rem;font-weight:bold;cursor:pointer;margin-bottom:10px;}
.btn-blue{background:#2563eb;color:white;}
.btn-green{background:#16a34a;color:white;}
.btn-gray{background:#e2e8f0;color:#475569;}
.btn:disabled{background:#94a3b8;color:white;cursor:not-allowed;}
#status{padding:14px;border-radius:10px;font-size:0.88rem;font-weight:bold;margin-top:16px;display:none;line-height:1.7;}
.ok{background:#dcfce7;color:#166534;}
.err{background:#fee2e2;color:#991b1b;}
.ing{background:#dbeafe;color:#1e40af;}
#log{margin-top:12px;font-size:0.72rem;color:#64748b;max-height:240px;overflow-y:auto;background:#f8fafc;padding:10px;border-radius:8px;display:none;line-height:1.8;}
.section{border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;margin-bottom:12px;}
.section h2{font-size:0.85rem;font-weight:bold;color:#1e293b;margin-bottom:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:0.7rem;font-weight:bold;margin-left:6px;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-red{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>
<div class="card">
  <h1>🔧 患者データ復元ツール</h1>
  <p class="sub">GASスプレッドシートの患者シートから完全復元します。<br>現在のlocalStorageより件数が多い場合のみ上書きします。</p>

  <div class="section">
    <h2>📊 現在の状態</h2>
    <div id="current-state">確認中...</div>
  </div>

  <div class="section">
    <h2>🔄 復元方法を選ぶ</h2>
    <button class="btn btn-blue" id="btn-gas" onclick="restoreFromGAS()">① GAS患者シートから復元（推奨）</button>
    <button class="btn btn-gray" id="btn-backup" onclick="restoreFromBackup()">② バックアップスプレッドシートから復元</button>
  </div>

  <div id="status"></div>
  <div id="log"></div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbytM-3C2aJtZp4sbaNDuM4-QR11qOSsvTlBwhj1wzCtppckrXIxE5rIB8ONju4O9XQgUQ/exec';

function addLog(msg){
  const el=document.getElementById('log');
  el.style.display='block';
  el.innerHTML+=msg+'<br>';
  el.scrollTop=el.scrollHeight;
}
function setStatus(msg,cls){
  const el=document.getElementById('status');
  el.style.display='block';
  el.className=cls;
  el.innerHTML=msg;
}
function setAllBtns(disabled){
  ['btn-gas','btn-backup'].forEach(id=>{
    const b=document.getElementById(id);
    if(b)b.disabled=disabled;
  });
}

// 現在の状態確認
function checkCurrent(){
  try{
    const data=JSON.parse(localStorage.getItem('kj_p')||'[]');
    const el=document.getElementById('current-state');
    el.innerHTML=`localStorageの患者数：<strong>${data.length}名</strong><span class="badge ${data.length>=50?'badge-green':'badge-red'}">${data.length>=50?'正常':'少ない'}</span>`;
  }catch(e){
    document.getElementById('current-state').textContent='確認エラー';
  }
}

function normTel(t){
  if(!t)return'';
  t=String(t).replace(/[^0-9]/g,'');
  if(t.length>=10&&!t.startsWith('0'))t='0'+t;
  return t;
}
function fmtDate(v){
  if(!v)return'';
  try{
    const s=String(v).trim();
    if(!s||s==='-'||s.includes('NaN'))return'';
    if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
    const d=new Date(s);
    if(!isNaN(d.getTime()))return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }catch(e){}
  return'';
}

// GASの生データをパース（全フィールド保持）
function parsePatientRows(rows){
  if(!rows||rows.length<=1)return[];
  const headers=rows[0].map(h=>String(h||'').trim());
  addLog('ヘッダー列: '+headers.join(' | '));

  const hi=k=>headers.indexOf(k);
  const isAddr=v=>v&&(String(v).includes('市')||String(v).includes('町')||String(v).includes('丁')||/\d+-\d+/.test(String(v)));
  const validSrc=['LINE','紹介','その他','三四郎','-','電話','ネット'];

  return rows.slice(1).filter(r=>r[0]!==''&&r[0]!=null&&String(r[0]).trim()!=='').map(r=>{
    const gv=(k,fb)=>{const i=hi(k);return String((i>-1?r[i]:(fb!=null?r[fb]:'')||'')).trim();};
    const gd=(k,fb)=>{const i=hi(k);return fmtDate(i>-1?r[i]:(fb!=null?r[fb]:''));};

    const id=String(r[0]||'').trim();
    const name=String(r[1]||'').trim();
    if(!id||!name)return null;

    // LINEユーザーID - 優先して取得
    const lineUidIdx=hi('LINEユーザーID');
    const lineUid=lineUidIdx>-1?String(r[lineUidIdx]||'').trim():'';

    // LINE有無
    const lineRaw=hi('LINE')>-1?String(r[hi('LINE')]||'').trim():'';
    const line=(lineRaw==='あり'||lineRaw==='なし'||lineRaw==='-')?lineRaw:'';

    // 住所
    const cityHdr=hi('住所')>-1?String(r[hi('住所')]||'').trim():'';
    const cityR4=String(r[4]||'').trim();
    const city=isAddr(cityHdr)?cityHdr:isAddr(cityR4)?cityR4:cityHdr||cityR4;

    // 職業
    const jobRaw=gv('職業',5);
    const job=isAddr(jobRaw)?'':jobRaw;

    // 流入元
    const srcRaw=gv('流入元',6);
    const src=validSrc.includes(srcRaw)?srcRaw:srcRaw;

    // 通院回数
    const cntI=hi('通院回数');
    const cntRaw=cntI>-1?r[cntI]:null;
    const cntNum=parseInt(cntRaw)||0;
    const cnt=cntNum>1900?0:cntNum;

    // 生年月日
    const dobI=hi('生年月日');
    const dobRaw=dobI>-1?r[dobI]:r[11];
    const dob=(()=>{
      if(!dobRaw)return'';
      const s=String(dobRaw).trim();
      if(!s||s.includes('NaN')||s==='-')return'';
      if(/^\d{4}$/.test(s))return s+'-01-01';
      if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
      return fmtDate(dobRaw)||'';
    })();

    return{
      id,name,
      kana:gv('ふりがな',2),
      sex:gv('性別',3),
      tel:normTel(gv('電話番号',4).replace(/[^0-9]/g,'')),
      line,lineUid,city,job,src,
      symptom:gv('症状',8),
      last:gd('前回通院日',9),
      count:cnt,dob,
      note:gv('備考',12),
    };
  }).filter(Boolean);
}

async function doRestore(action, label){
  setAllBtns(true);
  setStatus('🔄 '+label+'から取得中...','ing');
  document.getElementById('log').innerHTML='';

  try{
    addLog('GASに送信: action='+action);
    const res=await fetch(GAS,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action}),
      redirect:'follow'
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const raw=await res.text();
    addLog('受信: '+raw.length+'文字');

    let d;
    try{d=JSON.parse(raw);}
    catch(e){throw new Error('JSONパースエラー: '+raw.slice(0,120));}

    if(!d.ok)throw new Error(d.error||'GASエラー');

    addLog('行数: '+d.rows.length+'行');
    const parsed=parsePatientRows(d.rows);
    addLog('パース成功: '+parsed.length+'件');

    if(parsed.length===0)throw new Error('有効な患者データが0件でした');

    // 現在のデータと比較
    let existing=[];
    try{existing=JSON.parse(localStorage.getItem('kj_p')||'[]');}catch(e){}
    addLog('現在: '+existing.length+'件 → 復元後: '+parsed.length+'件');

    // 既存データとマージ（GASにないlocalStorageのdetailフィールドを保持）
    const merged=parsed.map(np=>{
      const old=existing.find(ep=>String(ep.id)===String(np.id));
      if(old){
        // GASにないフィールド（detail等）は既存データから引き継ぐ
        return Object.assign({},old,np);
      }
      return np;
    });
    // 既存にあってGASにない患者も保持
    const gasIds=new Set(parsed.map(p=>String(p.id)));
    const onlyLocal=existing.filter(p=>!gasIds.has(String(p.id)));
    const final=[...merged,...onlyLocal];
    addLog('マージ後: '+final.length+'件（GAS:'+parsed.length+' + ローカルのみ:'+onlyLocal.length+'）');

    localStorage.setItem('kj_p',JSON.stringify(final));
    setStatus('✅ 復元完了！ <strong>'+final.length+'名</strong>の患者データを書き込みました。<br>3秒後に管理画面へ移動します...','ok');
    checkCurrent();
    setTimeout(()=>{location.href='kanri.html';},3000);

  }catch(e){
    setStatus('❌ エラー: '+e.message,'err');
    addLog('エラー: '+e.message);
    setAllBtns(false);
  }
}

function restoreFromGAS(){doRestore('getRawPatients','GAS患者シート');}
function restoreFromBackup(){doRestore('getRawBackup','バックアップシート');}

checkCurrent();
</script>
</body>
</html>
